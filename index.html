<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NFS — Karting Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Roboto+Mono:wght@400;500;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090d;min-height:100vh;padding:0}
body,div,button,span,td,th{font-family:'Barlow Condensed',sans-serif}
.wrap{background:#08090d;color:#8a8a8a;font-size:14px;overflow:hidden;min-height:600px}

/* ── HEADER ── */
.header{background:#08090d;border-bottom:3px solid #e8b830;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:26px;font-weight:900;letter-spacing:6px;color:#fff;text-transform:uppercase}
.logo span{color:#e8b830}
.session-badge{background:#e8b830;color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 10px;text-transform:uppercase;border:none;border-radius:2px}
.timer-row{display:flex;align-items:center;gap:16px}
.timer{font-family:'Roboto Mono',monospace;font-size:26px;color:#fff;letter-spacing:3px}
.best-block{font-family:'Roboto Mono',monospace;font-size:26px;font-weight:700;color:#a78bfa;letter-spacing:2px}
.sectors{display:flex;gap:12px}
.sec{display:flex;align-items:center;gap:6px;background:transparent;border:none;padding:0}
.sec-label{font-size:9px;color:#999;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.sec-val{font-family:'Roboto Mono',monospace;font-size:13px;color:#999}

/* ── ROLE BADGE ── */
.role-badge{-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:2px;padding:5px 14px;border-radius:2px;cursor:pointer;transition:color .15s,border-color .15s,background .15s;user-select:none;text-transform:uppercase}
.role-badge.admin{background:#e8b830;border:none;color:#fff}
.role-badge.admin:hover{background:#c9a028;color:#fff}
.role-badge.user{background:transparent;border:1px solid #1a1a1a;color:#999}
.role-badge.user:hover{border-color:#e8b830;color:#e8b830}

/* ── TAB BAR ── */
.tabbar{background:#0a0b10;border-bottom:1px solid #1a1a1a;display:flex;gap:0;padding:0}
.tab-btn{touch-action:manipulation;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7a7a7a;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s}
.tab-btn:hover{color:#ddd;background:transparent !important;border-color:transparent !important}
.tab-btn.active{color:#fff;border-bottom:2px solid #e8b830}
.tab-live-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.6)}}

/* ── BUTTONS ── */
.btn{touch-action:manipulation;background:transparent;border:1px solid #444;border-radius:2px;padding:4px 12px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8a8a8a;cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.btn:hover{border-color:#e8b830;color:#ddd;background:transparent}
.btn.active{border-color:#e8b830;color:#e8b830;background:transparent}
.btn.active:hover{background:#e8b830;color:#fff;border-color:#e8b830}
.btn-danger{touch-action:manipulation;background:transparent;border:1px solid #7f1d1d;border-radius:2px;padding:4px 12px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ef4444;cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.btn-danger:hover{background:#ef4444;color:#fff}
.modal-close-btn{background:transparent;border:1px solid #1a1a1a;border-radius:2px;color:#999;font-size:11px;font-weight:700;cursor:pointer;padding:4px 14px;letter-spacing:1.5px;text-transform:uppercase;transition:color .15s,border-color .15s,background .15s}
.modal-close-btn:hover{border-color:#e8b830;color:#8a8a8a}

/* ── KART CARD ── */
.kart-card{-webkit-tap-highlight-color:transparent;touch-action:manipulation;background:#0a0b10;border:1px solid #1a1a1a;border-radius:2px;display:flex;align-items:center;gap:14px;padding:10px 16px;transition:background .15s;cursor:pointer;overflow:hidden}
.kart-card:hover{background:#15161f}
.kart-num{font-family:'Roboto Mono',monospace;font-size:24px;font-weight:700;color:#e8b830;letter-spacing:1px;line-height:1;min-width:44px}
.kart-card-divider{width:1px;height:34px;background:#1a1a1a;flex-shrink:0}
.kart-card-body{display:flex;flex-direction:column;gap:2px}
.kart-card-footer{}

/* ── SESSION LINK ── */
.session-link-btn{background:none;border:none;cursor:pointer;color:#999;font-size:12px;font-weight:600;font-family:'Barlow Condensed',sans-serif;padding:0;text-align:left;text-decoration:underline;text-underline-offset:2px;text-decoration-color:#1a1a1a;transition:color .15s}
.session-link-btn:hover{color:#e8b830;text-decoration-color:#e8b830}

.page{display:none}.page.active{display:block}
.controls{padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap}

/* ── LIVE TABLE ── */
.live-table{width:max-content;min-width:100%;border-collapse:collapse;table-layout:fixed}
.live-table thead tr{background:#0a0b10;border-bottom:1px solid #1a1a1a}
.live-table thead th{padding:12px 10px;font-size:13px;font-weight:700;letter-spacing:1.5px;color:#8a8a8a;text-align:right;text-transform:uppercase;white-space:nowrap;overflow:hidden;user-select:none}
.live-table thead th.tl{text-align:left}
.live-table thead th.sortable{cursor:pointer;transition:color .15s;color:#aaa;border-bottom:1px dashed #999;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.live-table thead th.sortable:hover{color:#ddd;border-bottom-color:#e8b830}
.live-table thead th.sort-asc,.live-table thead th.sort-desc{color:#e8b830}
.sort-arrow{margin-left:5px;font-size:14px;opacity:.85}
.live-table tbody tr{border-bottom:1px solid #0b0c12}
.live-table tbody tr:nth-child(odd){background-color:#0b0c12}
.live-table tbody tr:nth-child(even){background-color:#0d0e15}
.live-table tbody tr:hover{background-color:#15161f}
.live-table tbody tr.p1{}
.live-table td{padding:14px 10px;font-family:'Roboto Mono',monospace;font-size:16px;text-align:right;white-space:nowrap;overflow:hidden;color:#c8c8c8}
.live-table td.tl{text-align:left}
.col-pos{width:44px}.col-pilot{width:155px}.col-kart{width:44px}.col-num{width:80px}.col-best{width:148px}.col-laps{width:56px}
.view-basic .col-detail{display:none !important}.view-basic col.col-detail{display:table-column !important;width:0 !important}
.col-endurance{display:none !important}#page-live.endurance-mode .col-endurance{display:table-cell !important}
.kart-color-btn{display:none;width:10px;height:10px;border-radius:2px;background:#333;border:1px solid #444;cursor:pointer;vertical-align:middle;margin-right:5px;flex-shrink:0;transition:background .15s}
#page-live.endurance-mode.can-marathon .kart-color-btn{display:inline-block}
.kart-color-popup{position:fixed;background:#1a1b22;border:1px solid #2a2b35;border-radius:4px;padding:6px;display:flex;gap:5px;align-items:center;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.kart-color-swatch{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.kart-color-swatch:hover{border-color:#fff}
#pit-block{display:none;padding:8px 16px 14px;border-top:1px solid #1a1a1a;margin-top:4px}
#page-live.endurance-mode.can-marathon #pit-block{display:block}
.pit-chip{display:inline-flex;align-items:center;gap:5px;background:#111;border:1px solid #2a2b35;border-radius:3px;padding:4px 8px;margin:3px 4px 3px 0;font-family:'Roboto Mono',monospace;font-size:13px;color:#ddd}
.pit-chip-dot{width:12px;height:12px;border-radius:2px;background:#333}
.pit-chip-remove{cursor:pointer;color:#555;font-size:22px;line-height:1;margin-left:4px;padding:0 4px}
.pit-chip-remove:hover{color:#ef4444}
.endurance-basic .e-detail{display:none !important}

/* ── PILOT CELL ── */
.pilot-cell{width:155px;max-width:155px;overflow:hidden;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:400;color:#ddd;display:flex;align-items:center;gap:0}
.team-bar{width:3px;min-width:3px;height:14px;margin-right:8px;display:inline-block;border-radius:0}
.pilot-inner{display:inline-block;white-space:nowrap;overflow:hidden}
.pilot-inner.scrolling{animation:marquee 5s linear infinite}
@keyframes marquee{0%,30%{transform:translateX(0)}80%,100%{transform:translateX(var(--scroll-dist))}}

/* ── GENERIC TABLES ── */
table{width:100%;border-collapse:collapse}
thead tr{background:#0a0b10;border-bottom:1px solid #1a1a1a}
thead th{padding:9px 10px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:#8a8a8a;text-align:right;text-transform:uppercase;white-space:nowrap;user-select:none}
thead th.tl{text-align:left}
thead th.sortable-th{cursor:pointer;transition:color .15s;color:#8a8a8a;border-bottom:1px dashed #999}
thead th.sortable-th:hover{color:#ddd;border-bottom-color:#e8b830}
thead th.sort-asc,thead th.sort-desc{color:#e8b830}
tbody tr{border-bottom:1px solid #0b0c12;transition:background .08s}
tbody tr:hover{background:#0b0c12}
tbody tr.p1{background:#0d0e15}
td{padding:8px 10px;font-family:'Roboto Mono',monospace;font-size:13px;text-align:right;white-space:nowrap;color:#c8c8c8}td.pilot-c{font-family:'Barlow Condensed',sans-serif !important;font-size:16px !important;font-weight:400 !important;color:#ddd !important;text-align:left !important}
td.tl{text-align:left}

/* ── POSITION ── */
.pos-c{text-align:center !important}
.pos-box{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;font-family:'Roboto Mono',monospace;font-size:16px;font-weight:700;border-radius:2px}
.pos-1 .pos-box{background:#e8b830;color:#fff}
.pos-2 .pos-box{background:#1a1a1a;color:#8a8a8a}
.pos-3 .pos-box{background:#1a1a1a;color:#c8c8c8}
.pos-n{color:#999;font-family:'Roboto Mono',monospace;font-size:17px;font-weight:700}

/* ── TIMING COLOURS ── */
.pilot-c{font-family:'Barlow Condensed',sans-serif !important;font-size:16px !important;font-weight:400 !important;color:#ddd !important}
.kart-c{color:#999;font-size:15px;text-align:center !important;font-family:'Roboto Mono',monospace}
.t-personal{color:#34d399 !important}
.t-session{color:#a78bfa !important}
.t-normal{color:#fbbf24 !important}
.t-lapped{color:#ef4444 !important;font-size:13px}
.best-col{color:#34d399 !important}.t-session.best-col{color:#a78bfa !important}
.s1best-col{color:#34d399 !important}.t-session.s1best-col{color:#a78bfa !important}
.s2best-col{color:#34d399 !important}.t-session.s2best-col{color:#a78bfa !important}
.missed-col{color:#fb923c !important}
.gap-c{color:#60a5fa;font-size:15px}
.gap-lead{color:#8a8a8a}
.live-table.no-gap .gap-col{display:none}
/* ── ROW ANIMATIONS ── */
@keyframes lapFlash{0%{background-color:rgba(250,204,21,0.35)}100%{background-color:transparent}}
@keyframes posUp{0%{background-color:rgba(74,222,128,0.35)}100%{background-color:transparent}}
@keyframes posDown{0%{background-color:rgba(239,68,68,0.35)}100%{background-color:transparent}}
.row-lap-flash{animation:lapFlash 1.5s ease-out forwards}
.row-pos-up{animation:posUp 1.2s ease-out forwards}
.row-pos-down{animation:posDown 1.2s ease-out forwards}

/* ── STATUS / LEGEND ── */
.status-bar{padding:6px 16px;display:flex;align-items:center;gap:8px;font-size:11px;color:#c8c8c8;border-top:1px solid #1a1a1a;margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.legend{display:flex;gap:14px;align-items:center;padding:6px 16px;flex-wrap:wrap;background:#0a0b10;border-top:1px solid #1a1a1a}
.legend-i{display:flex;align-items:center;gap:5px;font-size:11px;color:#8a8a8a;letter-spacing:1.5px;text-transform:uppercase}
.dot{width:10px;height:4px;border-radius:0}
.ovx{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;display:block}

/* ── ARCHIVE ── */
.arch-list{padding:8px 16px}
.arch-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid #1a1a1a;gap:8px;flex-wrap:wrap}
.arch-toolbar-title{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase}
.day-group{margin-bottom:4px}
.day-header{-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#0a0b10;border:1px solid #1a1a1a;border-left:3px solid #e8b830;cursor:pointer;transition:background .15s;border-radius:0}
.day-header:hover{background:#15161f}
.day-header-left{display:flex;align-items:center;gap:10px}
.day-label{font-size:15px;font-weight:400;color:#ddd;letter-spacing:2px;text-transform:uppercase}
.day-count{font-size:11px;color:#c8c8c8;background:#0d0e15;border:1px solid #1a1a1a;border-radius:2px;padding:2px 8px;letter-spacing:1.5px;text-transform:uppercase}
.day-arrow{font-size:11px;color:#999}
.day-sessions{display:none;border:1px solid #1a1a1a;border-top:none;overflow:hidden}
.day-sessions.open{display:block}
.sess-card{background:#08090d;border-top:1px solid #0b0c12}
.sess-head{-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:border-color .15s}
.sess-head:hover{background:#15161f;border-left-color:#1a1a1a}
.sess-title{font-size:15px;font-weight:400;color:#ddd;letter-spacing:1px;text-transform:uppercase}
.sess-meta{display:flex;gap:10px;font-size:11px;color:#c8c8c8;margin-top:3px;letter-spacing:1.5px;text-transform:uppercase}
.sess-winner{font-size:15px;color:#e8b830;font-family:'Barlow Condensed',sans-serif;font-weight:400;letter-spacing:.5px}
.sess-actions{display:flex;align-items:center;gap:8px}
.sess-badge{background:#0d0e15;border:1px solid #1a1a1a;border-radius:2px;padding:2px 7px;font-size:9px;color:#999;letter-spacing:1.5px}
.sess-body{display:none;border-top:1px solid #1a1a1a}
.sess-body.open{display:block}

/* ── KARTS ── */
.karts-controls{padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap}
.day-filter-label{font-size:9px;color:#999;letter-spacing:2px;text-transform:uppercase}
.karts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;padding:12px 16px}
.kart-best-val{font-size:18px;font-family:'Roboto Mono',monospace;color:#34d399;margin:4px 0 2px;letter-spacing:1px}
.kart-sub{font-size:10px;color:#8a8a8a;margin-bottom:1px;letter-spacing:1.5px;text-transform:uppercase}
.kart-pilot-name{font-size:16px;color:#ddd;font-family:'Barlow Condensed',sans-serif;font-weight:400}
.kart-sessions-txt{font-size:9px;color:#999;margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.kart-rank{display:inline-block;font-size:9px;padding:2px 7px;border-radius:0;font-weight:700;letter-spacing:2px;text-transform:uppercase}



.no-data{padding:24px 16px;text-align:center;font-size:11px;color:#999;letter-spacing:2px;text-transform:uppercase}
.pilots-controls{padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap}
.pilots-grid{display:flex;flex-direction:column;gap:0;padding:0}
.pilot-card{background:#08090d;border-bottom:1px solid #1a1a1a;overflow:hidden;transition:background .15s}
.pilot-icon-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.pilot-icon-btn{background:#0c0e14;border:1px solid #1a1a1a;border-radius:4px;width:34px;height:34px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;flex-shrink:0;padding:0;line-height:1}
.pilot-icon-btn:hover{border-color:#444;background:#15161f}
.pilot-icon-btn.sel{border-color:#e8b830;background:#1a1700}
.pilot-card-head{display:flex;align-items:center;gap:10px;padding:6px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pilot-card-head:hover{background:#15161f}
.pilot-avatar{width:32px;height:32px;border-radius:50%;border:1px solid #2a2a2a;object-fit:cover;flex-shrink:0;background:#0a0b10}
.pilot-info{flex:1;min-width:0;display:flex;align-items:baseline;gap:10px}
.pilot-name{font-size:14px;font-weight:700;color:#ddd;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pilot-stat{font-size:11px;color:#8a8a8a;letter-spacing:1px;white-space:nowrap}
.pilot-actions{display:flex;gap:4px}
.pilot-actions button{background:transparent;border:1px solid #1a1a1a;border-radius:2px;color:#8a8a8a;font-size:11px;cursor:pointer;padding:3px 8px;transition:color .15s,border-color .15s,background .15s}
.pilot-actions button:hover{border-color:#e8b830;color:#e8b830}
.pilot-races{border-top:1px solid #1a1a1a;display:none}
.pilot-races.open{display:block}
.pilot-race-row{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:12px;color:#8a8a8a;cursor:pointer;transition:background .15s;letter-spacing:0.5px}
.pilot-race-row:nth-child(odd){background:#0b0c12}
.pilot-race-row:nth-child(even){background:#0d0e15}
.pilot-race-row:hover{background:#15161f}
.pilot-race-pos{font-family:'Roboto Mono',monospace;font-weight:700;min-width:28px}
.pilot-race-pos.p1{color:#e8b830}
.pilot-race-pos.p2,.pilot-race-pos.p3{color:#fff}
.pilot-race-time{font-family:'Roboto Mono',monospace;color:#ddd;margin-left:auto}
.no-pilots{text-align:center;padding:40px 16px;color:#8a8a8a;font-size:14px;letter-spacing:1px}

/* ── MODALS ── */
.modal-overlay{-webkit-tap-highlight-color:transparent;display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#08090d;border:1px solid #1a1a1a;border-top:3px solid #e8b830;border-radius:0;width:100%;max-width:520px;overflow:hidden;margin:auto}
.modal-wide{max-width:680px}
.modal-sm{max-width:400px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1a1a1a;background:#0a0b10}
.modal-kart-num{font-family:'Roboto Mono',monospace;font-size:26px;font-weight:700;color:#e8b830;letter-spacing:3px}
.modal-header-title{font-size:13px;font-weight:700;color:#ddd;letter-spacing:2px;text-transform:uppercase}
.modal-stats-row{display:flex;gap:20px;padding:10px 16px;border-bottom:1px solid #1a1a1a;background:#0a0b10;flex-wrap:wrap}
.mstat-label{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:2px}
.mstat-val{font-family:'Roboto Mono',monospace;font-size:15px;font-weight:400;letter-spacing:1px;color:#ddd}
.modal-body{max-height:420px;overflow-y:auto}
.modal-body table thead th{font-size:9px;padding:5px 10px;color:#999;letter-spacing:2px}
.modal-body table thead th.sortable-th{cursor:pointer;color:#999;border-bottom:1px dashed #999}
.modal-body table thead th.sortable-th:hover{color:#ddd;border-bottom-color:#e8b830}
.modal-body table td{padding:6px 10px;font-size:14px;color:#c8c8c8}.modal-body table td.tl{text-align:left !important}.modal-body table td.pilot-c{font-family:'Barlow Condensed',sans-serif !important;font-size:16px !important;font-weight:400 !important;color:#ddd !important}
.sec-head{padding:5px 10px;background:#0a0b10;font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid #1a1a1a}
.back-btn-row{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid #1a1a1a;background:#0a0b10}

/* ── LOGIN / CONFIRM ── */
.login-body{padding:24px 20px 8px}
.login-sub{font-size:10px;color:#999;margin-bottom:20px;letter-spacing:2px;text-transform:uppercase}

<!-- Collector API (replaces Firebase) -->
<script type="module">
const COLLECTOR='https://ekarting.duckdns.org';
const TZ='Europe/Kyiv';

function _fmtDateDMY(ms){
  const d=new Date(ms);
  const dd=String(d.toLocaleDateString('uk-UA',{timeZone:TZ,day:'2-digit'})).padStart(2,'0');
  const mm=String(d.toLocaleDateString('uk-UA',{timeZone:TZ,month:'2-digit'})).padStart(2,'0');
  const yy=d.toLocaleDateString('uk-UA',{timeZone:TZ,year:'numeric'});
  return `${dd}.${mm}.${yy}`;
}
function _fmtTime(ms){
  return new Date(ms).toLocaleTimeString('uk-UA',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false});
}

function setDbStatus(state){
  const el=document.getElementById('db-status');
  if(!el)return;
  if(state==='loading'){el.textContent='API: loading...';el.style.color='#f0c800';}
  else if(state==='ok'){el.textContent='API: connected';el.style.color='#39ef6e';}
  else{el.textContent='API: error';el.style.color='#e10600';}
}

/* Transform collector laps into results array matching app format */
function _lapsToResults(laps){
  const byPilot={};
  laps.forEach(l=>{
    const key=l.pilot;
    if(!byPilot[key])byPilot[key]={name:l.pilot,kart:l.kart,pos:0,lapTimes:[]};
    const p=byPilot[key];
    p.pos=l.position||p.pos;
    p.kart=l.kart||p.kart;
    p.lapTimes.push({lap:l.lap_time||null,s1:l.s1||null,s2:l.s2||null});
  });
  return Object.values(byPilot).map(p=>{
    // Compute best from lapTimes (filter valid laps >= 38s)
    const validTimes=p.lapTimes.map(t=>parseFloat(t.lap)).filter(n=>!isNaN(n)&&n>=38);
    const best=validTimes.length?Math.min(...validTimes).toFixed(3):'——';
    return{pos:p.pos,name:p.name,kart:p.kart,best,laps:p.lapTimes.length,gap:'—',lapTimes:p.lapTimes};
  }).sort((a,b)=>a.pos-b.pos);
}

/* ─── SESSIONS (from Collector API — persistent local cache) ─── */
window._loadSessions=async function(){
  setDbStatus('loading');

  // Always load full cache first (persistent, never expires)
  let existing=[];
  try{const c=localStorage.getItem('nfs_sessions_cache_v2');if(c)existing=JSON.parse(c);}catch(e){existing=[];}
  const cachedMap={};
  existing.forEach(s=>{cachedMap[s._collectorId||'']=s;});

  // Show cached data immediately
  if(existing.length){
    _applyDayOrder(existing);
    window.setSessions(existing);
    setDbStatus('ok');
    const ap=document.querySelector('.page.active');
    if(ap&&ap.id==='page-archive')window._fbRenderArchive();
    if(ap&&ap.id==='page-karts')window._fbRenderKarts();
  }

  // Then fetch new sessions from collector in background
  try{
    const countsResp=await fetch(COLLECTOR+'/db/session-counts?from=2026-01-01&to='+new Date().toISOString().slice(0,10));
    const dateCounts=await countsResp.json();
    const dates=dateCounts.map(d=>d.date);

    // Fetch session lists per date (batched)
    const DATE_BATCH=5;
    let rawSessions=[];
    for(let i=0;i<dates.length;i+=DATE_BATCH){
      const batch=dates.slice(i,i+DATE_BATCH);
      const results=await Promise.all(batch.map(d=>
        fetch(COLLECTOR+'/db/sessions?date='+d).then(r=>r.json()).catch(()=>[])
      ));
      results.forEach(arr=>{if(Array.isArray(arr))rawSessions.push(...arr);});
    }

    // Find only sessions not in cache
    const needLaps=rawSessions.filter(s=>!cachedMap[s.id]);
    if(!needLaps.length){
      setDbStatus('ok');
      console.log('Collector: all '+existing.length+' sessions from cache, 0 new');
      return;
    }

    // Fetch laps for new sessions (batched)
    const BATCH=10;
    const newSessions=[];
    for(let i=0;i<needLaps.length;i+=BATCH){
      const batch=needLaps.slice(i,i+BATCH);
      const lapsArr=await Promise.all(batch.map(s=>
        fetch(COLLECTOR+'/db/laps?session='+encodeURIComponent(s.id)).then(r=>r.json()).catch(()=>[])
      ));
      batch.forEach((s,j)=>{
        const sid=parseInt(s.id.replace('session-',''))||0;
        newSessions.push({
          sid,
          date:_fmtDateDMY(s.start_time),
          time:_fmtTime(s.start_time),
          title:'',
          pilots:s.real_pilot_count||s.pilot_count||0,
          winner:s.best_lap_pilot||'—',
          isRace:!!s.is_race,
          dayOrder:s.day_order||0,
          compName:s.competition_name||null,
          compPhase:s.competition_phase||null,
          trackId:s.track_id||0,
          results:_lapsToResults(lapsArr[j]),
          _collectorId:s.id
        });
      });
    }

    // Merge: cached (persistent) + new from collector
    const merged=[...existing,...newSessions];
    // Deduplicate by _collectorId
    const seen=new Set();
    const unique=merged.filter(s=>{const k=s._collectorId||s.sid;if(seen.has(k))return false;seen.add(k);return true;});
    unique.sort((a,b)=>(b.sid||0)-(a.sid||0));

    _applyDayOrder(unique);
    window.setSessions(unique);

    // Persist to cache (never deleted even if collector removes them)
    try{localStorage.setItem('nfs_sessions_cache_v2',JSON.stringify(unique));}catch(e){}

    setDbStatus('ok');
    console.log('Collector: '+newSessions.length+' new + '+existing.length+' cached = '+unique.length+' sessions');
    const ap=document.querySelector('.page.active');
    if(ap&&ap.id==='page-archive')window._fbRenderArchive();
    if(ap&&ap.id==='page-karts')window._fbRenderKarts();
  }catch(e){
    console.error('Collector API load:',e);
    // Cache still works offline
    if(existing.length){setDbStatus('ok');console.log('Offline: '+existing.length+' sessions from cache');}
    else setDbStatus('err');
  }
};

const _PHASE_LABELS={'qualifying':'Кваліфікація','qualifying_1':'Кваліфікація 1','qualifying_2':'Кваліфікація 2','race_1':'Гонка 1','race_2':'Гонка 2','race_3':'Гонка 3','race_1_group_1':'Гонка 1 (гр.1)','race_1_group_2':'Гонка 1 (гр.2)','race_2_group_1':'Гонка 2 (гр.1)','race_2_group_2':'Гонка 2 (гр.2)','race_3_group_1':'Гонка 3 (гр.1)','race_3_group_2':'Гонка 3 (гр.2)','final':'Фінал','semifinal_1':'Півфінал 1','semifinal_2':'Півфінал 2','practice':'Практика','warmup':'Прогрів'};
function _fmtPhase(p){return _PHASE_LABELS[p]||p||'';}

function _applyDayOrder(sessions){
  const byDate={};
  sessions.forEach(s=>{if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  Object.values(byDate).forEach(daySess=>{
    daySess.sort((a,b)=>a.sid-b.sid);
    daySess.forEach((s,i)=>{
      if(s.compName){
        s.title=s.compName+(s.compPhase?' · '+_fmtPhase(s.compPhase):'');
        s._isComp=true;
      }else{
        s.title='Заїзд №'+(s.dayOrder||(i+1));
      }
      if(s.winner==='—'&&s.results&&s.results.length){
        let bestTime=Infinity,bestPilot='—';
        s.results.forEach(r=>{const t=parseFloat(r.best);if(!isNaN(t)&&t<bestTime){bestTime=t;bestPilot=r.name;}});
        s.winner=bestPilot;
      }
    });
  });
}

/* Delete/save — collector manages sessions, read-only from frontend */
window._deleteSessions=async function(ids){
  // Delete from local cache only (collector data unchanged)
  const cur=window.getSessions()||[];
  const idSet=new Set(ids);
  const filtered=cur.filter(s=>!idSet.has(s._collectorId)&&!idSet.has(s.sid));
  window.setSessions(filtered);
  try{localStorage.setItem('nfs_sessions_cache_v2',JSON.stringify(filtered));}catch(e){}
};
window._saveSession=async function(){console.warn('Save not supported (collector auto-saves)');};

/* ─── PILOTS (localStorage) ─── */
window._pilotAllNames=function(p){return [p.name,...(p.aliases||[])];};

/* ─── AUTH (SHA-256 hashed passwords + signed session tokens) ─── */
const _AUTH_HASHES={
  admin:'081889fe11109ebe046667eb7e8a0edc7d7ae01cd396e4bf71022ebbc1a75731',
  friend:'b49ccf97401bb8c84176e8e3305e9dfb639077fc741725cc7bd8f04b524e8e9b'
};
const _AUTH_SECRET='nfs_timing_2026_sk';

async function _sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function _makeSessionToken(role,label){
  const ts=Date.now();
  const sig=await _sha256(_AUTH_SECRET+':'+role+':'+label+':'+ts);
  return JSON.stringify({role,label,ts,sig});
}

async function _validateSessionToken(token){
  try{
    const{role,label,ts,sig}=JSON.parse(token);
    if(!role||!sig||!ts)return null;
    // Token expires after 30 days
    if(Date.now()-ts>30*24*60*60*1000)return null;
    const expected=await _sha256(_AUTH_SECRET+':'+role+':'+label+':'+ts);
    if(sig!==expected)return null;
    return{role,label};
  }catch(e){return null;}
}

window._doFirebaseLogin=async function(password){
  const hash=await _sha256(password);
  let role=0,label='';
  if(hash===_AUTH_HASHES.admin){role=2;label='PANAS';}
  else if(hash===_AUTH_HASHES.friend){role=1;label='ПАНАС НАЙКРАЩИЙ';}
  else{if(window._onAuthError)window._onAuthError('auth/invalid-credential');return;}
  const token=await _makeSessionToken(role,label);
  localStorage.setItem('nfs_auth_token',token);
  if(window._onAuthSuccess)window._onAuthSuccess(role,label);
};

window._doFirebaseSignOut=async function(){
  localStorage.removeItem('nfs_auth_token');
  if(window._onAuthSignOut)window._onAuthSignOut();
};

/* ─── AUTO-INIT ─── */
setTimeout(async()=>{
  // Restore auth from signed session token
  const token=localStorage.getItem('nfs_auth_token');
  if(token){
    const session=await _validateSessionToken(token);
    if(session&&window._onAuthSuccess)window._onAuthSuccess(session.role,session.label);
    else localStorage.removeItem('nfs_auth_token'); // invalid/expired — clean up
  }

  // Load data (no auth required — collector API is public)
  window._loadPilots();
  window._loadSessions();
},100);
window._COLLECTOR=COLLECTOR;
window._fmtDateDMY=_fmtDateDMY;

/* ─── URL SETTINGS ─── */
let _fetchInterval=null;
let _currentUrl='';
let _eventsInterval=null;
let _fetchInFlight=false;
let _lastEventTs=0;
let _lastSavedSessionId=null;
let _isRace=false;
let _prevIsRace=false;
let _raceIsOnline=true;
let _liveTeamNames={};// {kartNumber: teamName} for endurance
let _physKartMap={};// {teamNumber: physKart} updated from teams + events
let _kartColors={};// {physKart: 'purple'|'green'|'yellow'|'red'} persisted in localStorage
let _pitKarts=new Set();// physical kart numbers currently in pit
let _stintTime={};// {kartNumber: stint seconds}
let _pitCount={};// {kartNumber: number of pits}
let _lastNonPitEvent={};// {teamNumber: {ts, totalOnTrack(sec)}} — last event where isOnPit=false
let _wasOnPit={};// {teamNumber: bool} — previous isOnPit state for transition detection
let _lastPitTime={};// {teamNumber: seconds} — last pit duration from lastPitMainTime
let _raceFinishedPosMap=null; // frozen race positions: pilot→{pos,gap}
let _prevLapCounts=new Map();
let _bestSegments=new Map();
let _lapCompletedAt=new Map(); // pilot→{ts,expectedMs}
let _prevS1=new Map();         // pilot→s1 value (for sector detection)
let _s1CompletedAt=new Map();  // pilot→{ts,s1ratio}
let _pendingReset=new Map();   // pilot→{applyAt,expectedMs} — waiting for flash to finish
let _justReset=new Set();      // pilots whose reset was just applied — skip S1 detection once
let _progressRAF=null;
let _minValidLap=parseFloat(localStorage.getItem('nfs_min_lap'))||20;
function _isValidTime(t){const s=parseTimeSec(t);return !isNaN(s)&&s>=_minValidLap;}
function _validSec(n){return !isNaN(n)&&n>=_minValidLap;}
function _bestFromLaps(r){
  // Compute best lap from lapTimes array (if available), applying minLap filter
  if(!r.lapTimes||!r.lapTimes.length)return _isValidTime(r.best)?parseTimeSec(r.best):NaN;
  const valid=r.lapTimes.map(l=>parseTimeSec(l.lap)).filter(n=>_validSec(n));
  return valid.length?Math.min(...valid):NaN;
}
let _lastFlashLap=new Map(); // pilot → lapNumber when last flashed
// Marathon/pitstop tracking: kart → [{pilot, best, laps}]
let _kartHistory=new Map();
let _pilotLapTimes=new Map(); // pilot → [lapTime seconds, ...]
let _activeRaceNumber=null;

function updateUrlDisplay(url){
  const el=document.getElementById('live-url-display');
  if(url){el.textContent=url;el.style.color='#38bdf8';}
  else{el.textContent='Demo · URL not set';el.style.color='#2a3040';}
}
function saveUrl(){
  const url=document.getElementById('url-input').value.trim();
  _currentUrl=url;
  localStorage.setItem('nfs_timing_url',url);
  updateUrlDisplay(url);
  setStatus(url?'saved':'cleared','ok');
  setTimeout(()=>setStatus(url?'connected':'not connected',url?'ok':'idle'),1500);
  stopEventsPoller();
  _lastEventTs=0;
  applyInterval();
}
function testUrl(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){setStatus('enter URL','err');return;}
  setStatus('checking...','idle');
  fetch(url,{mode:'no-cors'})
    .then(()=>{setStatus('✓ available','ok');})
    .catch(()=>{setStatus('✗ unavailable','err');});
}
function setStatus(msg,type){
  const el=document.getElementById('url-status');
  el.textContent=msg;
  el.className='url-status '+(type||'idle');
  const tabDot=document.querySelector('.tab-live-dot');
  if(tabDot){
    if(type==='ok'){tabDot.style.background='#34d399';}
    else{tabDot.style.background='#ef4444';}
  }
}
function applyInterval(){
  if(_fetchInterval){clearInterval(_fetchInterval);_fetchInterval=null;}
  stopEventsPoller();
  const secs=parseInt(document.getElementById('url-interval').value);
  if(secs>0&&_currentUrl){
    _fetchInterval=setInterval(fetchLiveData,secs*1000);
    setStatus('auto-refresh '+secs+'s','ok');
  }
}
function setMinLap(v){
  const n=parseFloat(v);
  if(!isNaN(n)&&n>=1&&n<=120){
    _minValidLap=n;localStorage.setItem('nfs_min_lap',n);
  }
  const inp=document.getElementById('min-lap-input');if(inp)inp.value=_minValidLap;
}
function stopEventsPoller(){
  if(_eventsInterval){clearInterval(_eventsInterval);_eventsInterval=null;}
}
function startEventsPoller(){
  stopEventsPoller();
  if(!_currentUrl)return;
  let eventsUrl;
  try{eventsUrl=new URL(_currentUrl).origin+'/events';}catch(e){return;}
  _eventsInterval=setInterval(()=>{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),2000);
    fetch(eventsUrl+'?since='+_lastEventTs,{signal:ctrl.signal})
      .then(r=>r.json())
      .then(events=>{
        clearTimeout(t);
        if(!Array.isArray(events))return;
        const validTs=events.filter(e=>typeof e.ts==='number'&&!isNaN(e.ts));
        if(validTs.length)_lastEventTs=Math.max(...validTs.map(e=>e.ts));
        const lapEvents=events.filter(e=>e.type==='lap'&&e.data&&e.data.pilot);
        lapEvents.forEach(ev=>{
          const d=ev.data;const t=parseTimeSec(d.lastLap);
          if(!isNaN(t)&&t>=_minValidLap){
            if(!_pilotLapTimes.has(d.pilot))_pilotLapTimes.set(d.pilot,[]);
            _pilotLapTimes.get(d.pilot).push(t);
          }
        });
        // Track isOnPit transitions for stint time, pit count & pit duration
        events.forEach(ev=>{
          const d=ev.data;if(!d)return;
          const t=d.team;if(!t||!t.number)return;
          const num=t.number;
          if(t.kart&&t.kart!=='0')_physKartMap[num]=t.kart;
          const onPit=t.isOnPit===true||t.isOnPit==='true';
          const was=!!_wasOnPit[num];
          if(!onPit){
            const tot=_parseTotalOnTrack(t.totalOnTrack);
            _lastNonPitEvent[num]={ts:ev.ts,totalOnTrack:tot};
            _stintTime[num]=tot;
            if(was){
              // Transition true→false: exited pit
              _pitCount[num]=parseInt(t.pitstops)||(_pitCount[num]||0);
              const pitSec=parseTimeSec(t.lastPitMainTime);
              if(!isNaN(pitSec)&&pitSec>0)_lastPitTime[num]=pitSec;
              // Auto-remove from pit block
              const pk=_physKartMap[num];
              if(pk&&pk!=='0'){_pitKarts.delete(String(pk));renderPitBlock();}
            }
          }else{
            // onPit=true
            if(!was){
              // Transition false→true: entered pit — freeze stint time
              // stintTime = totalOnTrack(lastNonPit) + (ts(pitEntry) - ts(lastNonPit)) - totalOnTrack(pitEntry)
              const prev=_lastNonPitEvent[num];
              if(prev){
                const tsDelta=Math.max(0,(ev.ts-prev.ts)/1000);
                const pitTot=_parseTotalOnTrack(t.totalOnTrack);
                _stintTime[num]=prev.totalOnTrack+tsDelta-pitTot;
              }
              // Auto-add to pit block
              const pk=_physKartMap[num];
              if(pk&&pk!=='0'){_pitKarts.add(String(pk));renderPitBlock();}
            }
          }
          _wasOnPit[num]=onPit;
        });
        const lapPilots=new Set(lapEvents.map(e=>e.data.pilot));
        if(lapPilots.size>0)fetchLiveData(lapPilots);
      })
      .catch(()=>{clearTimeout(t);});
  },1000);
}

function fetchLiveData(lapPilots){
  if(!_currentUrl||_fetchInFlight)return;
  _fetchInFlight=true;
  const prevPositions=new Map(liveData.map(d=>[d.name,d.pos]));
  const _fc=new AbortController();
  const _ft=setTimeout(()=>_fc.abort(),5000);
  fetch(_currentUrl,{signal:_fc.signal})
    .then(r=>r.json())
    .then(data=>{
      // Collector API: {isOnline, entries:[{position,pilot,kart,lastLap,s1,s2,bestLap,lapNumber}]}
      if(typeof data!=='object'||!('isOnline' in data)){setStatus('unknown format','err');return;}
      if(!data.isOnline){setStatus('timing offline','idle');_stopProgressLoop();_lapCompletedAt.clear();_s1CompletedAt.clear();_prevS1.clear();_pendingReset.clear();_justReset.clear();const _rt=document.getElementById('race-timer'),_hb=document.getElementById('header-best'),_rn=document.getElementById('race-name');if(_rt)_rt.textContent='——:——:——';if(_hb)_hb.textContent='——';if(_rn)_rn.textContent='';const _arw=document.getElementById('active-race-widget');if(_arw)_arw.style.display='none';if(_raceIsOnline){_raceIsOnline=false;stopEventsPoller();if(_fetchInterval){clearInterval(_fetchInterval);_fetchInterval=null;_fetchInterval=setInterval(fetchLiveData,10000);}}return;}
      if(!_raceIsOnline){_raceIsOnline=true;_kartHistory.clear();_pilotLapTimes.clear();_bestSegments.clear();_prevLapCounts.clear();_activeRaceNumber=null;_raceFinishedPosMap=null;_prevIsRace=false;const _si=parseInt(document.getElementById('url-interval').value);if(_si>0){if(_fetchInterval){clearInterval(_fetchInterval);_fetchInterval=null;_fetchInterval=setInterval(fetchLiveData,_si*1000);}startEventsPoller();}}
      const _finished=!data.isOnline;
      const _fbadge=document.getElementById('race-finish-badge');
      if(_fbadge)_fbadge.style.display=_finished?'':'none';
      const _newIsRace=!!(data.meta&&data.meta.isRace);
      if(_prevIsRace&&!_newIsRace&&liveData.length>0){
        // race just ended — freeze positions before re-sort
        _raceFinishedPosMap=new Map(liveData.map(d=>[d.name,{pos:d.pos,gap:d.gap}]));
      }
      if(!_prevIsRace&&_newIsRace){_raceFinishedPosMap=null;}
      _isRace=_newIsRace;_prevIsRace=_newIsRace;
      const entries=data.entries||[];
      if(!entries.length){setStatus('no pilots','idle');return;}
      // detect actual lap completions by comparing lap counts
      const actualLapPilots=new Set();
      entries.forEach(e=>{
        const prev=_prevLapCounts.get(e.pilot);
        if(prev!==undefined&&e.lapNumber>prev)actualLapPilots.add(e.pilot);
        _prevLapCounts.set(e.pilot,e.lapNumber);
      });
      // build lag map and physical kart map from teams (keyed by kart number string)
      const lagMap={};
      _liveTeamNames={};
      (data.teams||[]).forEach(t=>{lagMap[String(t.number)]=t.lag;if(t.kart&&t.kart!=='0')_physKartMap[String(t.number)]=t.kart;if(t.teamName)_liveTeamNames[String(t.number)]=t.teamName;if(t.pitstops!==undefined)_pitCount[String(t.number)]=parseInt(t.pitstops)||0;});
      const pl=document.getElementById('page-live');
      if(Object.keys(_liveTeamNames).length)pl.classList.add('endurance-mode');else pl.classList.remove('endurance-mode');
      liveData.length=0;
      entries.forEach(e=>{
        const pos=parseInt(e.position);
        // gap: only for race sessions; qualifying has no meaningful gap
        const lagVal=lagMap[String(e.kart)];
        const gap=_isRace?(pos===1?'0':lagVal!=null?'+'+parseFloat(lagVal).toFixed(3):'——'):'——';
        // anomaly filter: skip times below minimum valid lap
        const lastValid=_isValidTime(e.lastLap);
        const bestValid=_isValidTime(e.bestLap);
        // s1best/s2best: merge server-tracked bests with client-tracked (only from valid laps)
        const stored=_bestSegments.get(e.pilot)||{s1:Infinity,s2:Infinity,lap:Infinity};
        const srvS1=parseTimeSec(e.s1best),srvS2=parseTimeSec(e.s2best);
        if(!isNaN(srvS1)&&srvS1<stored.s1)stored.s1=srvS1;
        if(!isNaN(srvS2)&&srvS2<stored.s2)stored.s2=srvS2;
        const srvLap=parseTimeSec(e.bestLapClean);
        if(!isNaN(srvLap)&&srvLap<stored.lap&&(e.lapNumber||0)>0)stored.lap=srvLap;
        if(lastValid){
          const curS1=parseTimeSec(e.s1),curS2=parseTimeSec(e.s2);
          if(!isNaN(curS1)&&curS1<stored.s1)stored.s1=curS1;
          if(!isNaN(curS2)&&curS2<stored.s2)stored.s2=curS2;
          const curLap=parseTimeSec(e.lastLap);
          if(!isNaN(curLap)&&curLap<stored.lap)stored.lap=curLap;
        }
        _bestSegments.set(e.pilot,stored);
        const s1best=isFinite(stored.s1)?stored.s1.toFixed(3).replace(/^0+/,''):'——';
        const s2best=isFinite(stored.s2)?stored.s2.toFixed(3).replace(/^0+/,''):'——';
        // best: use server clean best > client tracked best > collector bestLap (if valid)
        const trackedBest=isFinite(stored.lap)?stored.lap.toFixed(3):null;
        const cleanBest=(e.lapNumber||0)===0?'——':(trackedBest||(bestValid?e.bestLap:'——'));
        // perfect lap: s1best+s2best if both; if no S1 → perfect = best S2
        const s1n=parseFloat(s1best),s2n=parseFloat(s2best);
        const missed=(!isNaN(s1n)&&!isNaN(s2n))?(s1n+s2n).toFixed(3):(isNaN(s1n)&&!isNaN(s2n))?s2best:'——';
        const displayKart=_physKartMap[String(e.kart)]||e.kart;
        liveData.push({
          pos, num:e.kart, name:e.pilot, kart:displayKart, laps:e.lapNumber,
          lastlap:e.lastLap||'——', s1:e.s1||'——', s2:e.s2||'——',
          best:cleanBest, s1best, s2best, gap, missed, lapTimes:e.lapTimes||[]
        });
      });
      // Track kart→pilot history (marathon/pitstop support)
      const curRaceNum=data.meta&&data.meta.raceNumber?data.meta.raceNumber:null;
      if(curRaceNum!==_activeRaceNumber){_kartHistory.clear();_pilotLapTimes.clear();_bestSegments.clear();_prevLapCounts.clear();_lapCompletedAt.clear();_s1CompletedAt.clear();_prevS1.clear();_pendingReset.clear();_justReset.clear();_physKartMap={};_pitKarts=new Set();_activeRaceNumber=curRaceNum;_lastSavedSessionId=null;_raceFinishedPosMap=null;_prevIsRace=false;}
      // Seed _kartHistory from session events (full history incl. pilots who left)
      if(!_kartHistory.size&&data.sessionId&&_currentUrl){
        // Immediate seed from current entries
        entries.forEach(e=>{
          const k=String(e.kart);
          if(!_kartHistory.has(k))_kartHistory.set(k,[]);
          const kArr=_kartHistory.get(k);
          if(!kArr.find(r=>r.pilot===e.pilot)){
            const bt=parseTimeSec(e.bestLapClean||e.bestLap);
            kArr.push({pilot:e.pilot,best:!isNaN(bt)?bt:null,laps:e.lapNumber||0,startLap:0});
          }
        });
        // Then enrich with full history from /events (includes pilots who already left)
        const _evBase=new URL(_currentUrl).origin;
        fetch(_evBase+'/events?session='+encodeURIComponent(data.sessionId)).then(r=>r.json()).then(events=>{
          if(!Array.isArray(events))return;
          const lapEvents=events.filter(e=>e.type==='lap'&&e.data);
          lapEvents.forEach(ev=>{
            const d=ev.data;
            const k=String(d.kart);
            if(!_kartHistory.has(k))_kartHistory.set(k,[]);
            const kArr=_kartHistory.get(k);
            let rec=kArr.find(r=>r.pilot===d.pilot);
            if(!rec){rec={pilot:d.pilot,best:null,laps:0,startLap:0};kArr.push(rec);}
            const ln=parseInt(d.lapNumber)||0;
            if(ln>rec.laps)rec.laps=ln;
            const bt=parseTimeSec(d.bestLap);
            if(!isNaN(bt)&&(rec.best===null||bt<rec.best))rec.best=bt;
            const lt=parseTimeSec(d.lastLap);
            if(!isNaN(lt)&&lt>=_minValidLap){
              if(!_pilotLapTimes.has(d.pilot))_pilotLapTimes.set(d.pilot,[]);
              _pilotLapTimes.get(d.pilot).push(lt);
            }
          });
          console.log('Restored kartHistory from '+lapEvents.length+' lap events');
          updateActiveRaceWidget(data);
        }).catch(()=>{});
      }
      entries.forEach(e=>{
        const k=String(e.kart);
        if(!_kartHistory.has(k))_kartHistory.set(k,[]);
        const arr=_kartHistory.get(k);
        let rec=arr.find(r=>r.pilot===e.pilot);
        if(!rec){
          rec={pilot:e.pilot,best:null,laps:0,startLap:e.lapNumber||0};
          arr.push(rec);
        }
        rec.laps=(e.lapNumber||0)-rec.startLap;
        const bt=parseTimeSec(e.bestLapClean||e.bestLap);
        if(!isNaN(bt)&&(rec.best===null||bt<rec.best))rec.best=bt;
      });
      updateActiveRaceWidget(data);
      // Recalculate session stats
      sLL=Math.min(...liveData.map(d=>parseTimeSec(d.best)).filter(n=>!isNaN(n)));
      sLLmin=Math.min(...liveData.map(d=>parseTimeSec(d.lastlap)).filter(n=>!isNaN(n)));
      sLLmax=Math.max(...liveData.map(d=>parseTimeSec(d.lastlap)).filter(n=>!isNaN(n)));
      sBest=sLL;
      sS1b=Math.min(...liveData.map(d=>parseFloat(d.s1best)).filter(n=>!isNaN(n)));
      sS2b=Math.min(...liveData.map(d=>parseFloat(d.s2best)).filter(n=>!isNaN(n)));
      sMissed=Math.min(...liveData.map(d=>parseFloat(d.missed)).filter(n=>!isNaN(n)));
      if(!isFinite(sS1b))sS1b=Infinity;if(!isFinite(sS2b))sS2b=Infinity;if(!isFinite(sMissed))sMissed=Infinity;
      if(_raceFinishedPosMap){
        // apply frozen race positions, ignore server re-sort by best time
        liveData.forEach(d=>{const f=_raceFinishedPosMap.get(d.name);if(f){d.pos=f.pos;d.gap=f.gap;}});
        liveData.sort((a,b)=>a.pos-b.pos);
      }else if(!_isRace){
        liveData.sort((a,b)=>(parseTimeSec(a.best)||9999)-(parseTimeSec(b.best)||9999));
      }
      // Track lap/sector timestamps for progress extrapolation (BEFORE renderLive)
      const _now=Date.now();
      liveData.forEach(d=>{
        const lapSec=parseTimeSec(d.lastlap);
        const expectedMs=(!isNaN(lapSec)&&lapSec>=_minValidLap)?lapSec*1000:45000;
        if(actualLapPilots.has(d.name)){
          // Lap completed → freeze bar at 0.99, schedule reset after flash animation (~1.5s)
          _pendingReset.set(d.name,{applyAt:_now+1500,expectedMs});
          _prevS1.delete(d.name);
          _s1CompletedAt.delete(d.name);
          _justReset.delete(d.name); // clear stale justReset if new lap arrived
        }else if(!_lapCompletedAt.has(d.name)&&!_pendingReset.has(d.name)&&d.laps>0){
          // First time seeing this pilot mid-race → estimate mid-lap
          _lapCompletedAt.set(d.name,{ts:_now-expectedMs*0.5,expectedMs});
        }
        // S1 changed → pilot crossed S1 line (skip if reset pending or just reset)
        if(!_pendingReset.has(d.name)){
          const curS1=d.s1;
          if(_justReset.has(d.name)){
            // Reset just applied — sync prevS1 without triggering S1 detection (prevents bar jump)
            _prevS1.set(d.name,curS1);
            _justReset.delete(d.name);
          }else if(curS1&&curS1!=='——'&&curS1!==_prevS1.get(d.name)){
            const info=_lapCompletedAt.get(d.name);
            if(info){
              const s1Sec=parseTimeSec(curS1),lapSec=info.expectedMs/1000;
              _s1CompletedAt.set(d.name,{ts:_now,s1ratio:(!isNaN(s1Sec)&&lapSec>0)?s1Sec/lapSec:0.5});
            }
            _prevS1.set(d.name,curS1);
          }else{
            _prevS1.set(d.name,curS1);
          }
        }
      });
      const _showRaceLayout=_isRace||!!_raceFinishedPosMap;
      renderLive(_showRaceLayout?liveData:[...liveData]);
      _startProgressLoop();
      const _ltbl=document.querySelector('.live-table');
      if(_ltbl)_ltbl.classList.toggle('no-gap',!_showRaceLayout);
      if(actualLapPilots.size>0)applyLapAndPositionEffects(actualLapPilots,prevPositions);
      // update header timer, race name and best
      if(data.meta&&data.meta.totalRaceTime){
        const el=document.getElementById('race-timer');
        if(el)el.textContent=data.meta.totalRaceTime;
      }
      if(data.meta&&data.meta.raceNumber){
        const rn=document.getElementById('race-name');
        if(rn)rn.textContent='Заїзд №'+data.meta.raceNumber;
      }
      const hb=document.getElementById('header-best');
      if(hb)hb.textContent=isFinite(sBest)?sBest.toFixed(3):'—';
      setStatus(_finished?'finished':'updated '+new Date().toLocaleTimeString('uk'),'ok');
      // Session saving is handled by the collector service
    })
    .catch(e=>setStatus(e&&e.name==='AbortError'?'timeout':'fetch error','err'))
    .finally(()=>{clearTimeout(_ft);_fetchInFlight=false;});
}

function fmt(val){
  if(val===undefined||val===null||val==='——'||val==='—')return val;
  if(typeof val==='string'&&/^\+?\d+:\d+\.\d+$/.test(val))return val;
  const n=parseFloat(val);
  if(isNaN(n))return val;
  const prefix=(typeof val==='string'&&val.startsWith('+'))?'+':'';
  return prefix+(Math.floor(n*100)/100).toFixed(2);
}
function parseTimeSec(t){
  if(!t||t==='——'||t==='—')return NaN;
  const m=t.match(/^(\d+):(\d+\.\d+)$/);
  if(m)return parseInt(m[1])*60+parseFloat(m[2]);
  return parseFloat(t);
}
function lapColour(val,sessionBest,personalBest){
  const n=parseTimeSec(val);if(isNaN(n)||val==='——')return 't-lapped';
  if(Math.abs(n-sessionBest)<.005)return 't-session';
  if(personalBest!==undefined&&Math.abs(n-parseTimeSec(personalBest))<.005)return 't-personal';
  return 't-normal';
}

function applyLapAndPositionEffects(lapPilots,prevPositions){

function _obColor(val,sessionBest,personalBest){
  const n=parseTimeSec(val);if(isNaN(n))return'color:#666';
  if(Math.abs(n-sessionBest)<.005)return'color:#a78bfa';
  if(personalBest!==undefined&&Math.abs(n-parseTimeSec(personalBest))<.005)return'color:#4ade80';
  return'color:#e8b830';
}
function _obDelta(val,ref){
  const v=parseTimeSec(val),r=parseTimeSec(ref);
  if(isNaN(v)||isNaN(r))return{text:'',color:'#666'};
  const d=v-r;
  if(Math.abs(d)<.005)return{text:'±0.00',color:'#4ade80'};
  return{text:(d>0?'+':'')+d.toFixed(2),color:d>0?'#ef4444':'#4ade80'};
}
function _obFlash(el,colorStyle){
  const cls=colorStyle.includes('#a78bfa')?'ob-flash-purple':colorStyle.includes('#4ade80')?'ob-flash-green':'ob-flash-yellow';

}

/* ─── LAP PROGRESS ─── */
function _calcProgress(pilot){
  const now=Date.now();
  // Pending reset: flash animation playing, bar frozen at 0.99
  const pending=_pendingReset.get(pilot);
  if(pending){
    if(now>=pending.applyAt){
      // Flash done → apply reset, bar starts from 0
      _lapCompletedAt.set(pilot,{ts:now,expectedMs:pending.expectedMs});
      _s1CompletedAt.delete(pilot);
      _pendingReset.delete(pilot);
      _justReset.add(pilot); // skip S1 detection on next fetch to prevent jump
      return 0;
    }
    return 0.99; // frozen while flash plays
  }
  const info=_lapCompletedAt.get(pilot);
  if(!info)return -1; // no data yet
  const elapsed=now-info.ts;
  const s1Info=_s1CompletedAt.get(pilot);
  if(s1Info){
    // After S1: extrapolate from S1 point to lap end
    const s1Pct=s1Info.s1ratio;
    const s2Expected=info.expectedMs*(1-s1Pct);
    const s2Elapsed=now-s1Info.ts;
    return Math.min(s1Pct+((1-s1Pct)*(s2Elapsed/s2Expected)),0.99);
  }
  // Before S1: extrapolate from lap start
  return Math.min(elapsed/info.expectedMs,0.99);
}
function _renderProgress(){
  const rows=document.querySelectorAll('#live-tbody tr[data-pilot]');
  if(!rows.length){_stopProgressLoop();return;}
  rows.forEach(tr=>{
    const pct=_calcProgress(tr.dataset.pilot);
    if(pct<0){tr.style.backgroundImage='';return;}
    const p=Math.round(pct*1000)/10;
    tr.style.backgroundImage=`linear-gradient(to right,rgba(232,184,48,0.08) ${p}%,transparent ${p}%)`;
  });
  _progressRAF=requestAnimationFrame(_renderProgress);
}
function _startProgressLoop(){if(!_progressRAF)_progressRAF=requestAnimationFrame(_renderProgress);}
function _stopProgressLoop(){
  if(_progressRAF){cancelAnimationFrame(_progressRAF);_progressRAF=null;}
  document.querySelectorAll('#live-tbody tr[data-pilot]').forEach(tr=>{tr.style.backgroundImage='';});
}

/* ─── SESSION TABLE (with sort) ─── */
let _sessSortField='pos',_sessSortDir=1,_sessSid=null,_sessHlKart=null,_sessHlPilot=null;
function buildSessionTable(sid,highlightKart){
  _sessSid=sid;_sessHlKart=highlightKart;
  return _renderSessionTable();
}
function _renderSessionTable(){
  const s=sessions.find(x=>x.sid===_sessSid);
  if(!s)return '<p style="padding:12px;color:#8a8a8a;font-size:12px">No data</p>';
  const bB=Math.min(...s.results.map(r=>_bestFromLaps(r)).filter(n=>!isNaN(n)));
  const sorted=[...s.results].sort((a,b)=>{
    if(_sessSortField==='pos')return _sessSortDir*(a.pos-b.pos);
    const aT=_bestFromLaps(a),bT=_bestFromLaps(b);
    return _sessSortDir*((isNaN(aT)?9999:aT)-(isNaN(bT)?9999:bT));
  });
  const arrowPos=_sessSortField==='pos'?(_sessSortDir===1?'▲':'▼'):'';
  const arrowBest=_sessSortField==='best'?(_sessSortDir===1?'▲':'▼'):'';
  const clsPos='sortable-th'+(_sessSortField==='pos'?(_sessSortDir===1?' sort-asc':' sort-desc'):'');
  const clsBest='sortable-th'+(_sessSortField==='best'?(_sessSortDir===1?' sort-asc':' sort-desc'):'');
  const _sessHasGap=sorted.some(r=>r.gap&&r.gap.startsWith('+'));
  // Session-wide bests from all lapTimes (for purple highlighting)
  const allLaps=[];
  s.results.forEach(r=>{if(r.lapTimes)r.lapTimes.forEach(l=>{if(_isValidTime(l.lap))allLaps.push(l);});});
  const sessBestLap=allLaps.length?Math.min(...allLaps.map(l=>parseTimeSec(l.lap))):Infinity;
  const sessBestS1=allLaps.length?Math.min(...allLaps.map(l=>parseTimeSec(l.s1)).filter(n=>!isNaN(n))):Infinity;
  const sessBestS2=allLaps.length?Math.min(...allLaps.map(l=>parseTimeSec(l.s2)).filter(n=>!isNaN(n))):Infinity;
  const _hlP=_sessHlPilot?_findPilotByName(_sessHlPilot):null;
  const _hlNames=_hlP?_pilotAllNames(_hlP):_sessHlPilot?[_sessHlPilot]:[];
  const rows=sorted.map((r,ri)=>{
    const isHl=(_sessHlKart&&r.kart===_sessHlKart)||(_hlNames.length&&_hlNames.includes(r.name));
    const rBest=_bestFromLaps(r);
    const rBestV=!isNaN(rBest);
    const rBestStr=rBestV?rBest.toFixed(3):(r.best&&r.best!=='——'&&!isNaN(parseTimeSec(r.best))?`<span style="text-decoration:line-through;opacity:.45">${r.best}</span>`:'——');
    const bCls=(rBestV&&Math.abs(rBest-bB)<.005)?'best-col t-session':'best-col';
    const gapCls=r.gap==='0'?'gap-lead':'gap-c';
    const hasLaps=r.lapTimes&&r.lapTimes.length;
    const rowId='slr'+_sessSid+'_'+ri;
    const clickAttr=hasLaps?` style="cursor:pointer;${isHl?'background:#1a2a10;outline:1px solid #4ade80':''}" onclick="_toggleSessLaps('${rowId}')"`:`style="${isHl?'background:#1a2a10;outline:1px solid #4ade80':''}"`;
    let html=`<tr class="${r.pos===1?'p1':''}"${clickAttr}>
      <td class="${pc(r.pos)}">${r.pos}</td>
      <td class="pilot-c tl" style="font-weight:400">${r.name}${hasLaps?' <span style="font-size:9px;color:#555">▼</span>':''}</td>
      <td class="${isHl?'t-personal':'kart-c'}" style="text-align:center;font-weight:${isHl?700:400}">#${r.kart}</td>
      ${_sessHasGap?`<td class="${gapCls}">${r.gap||'—'}</td>`:''}
      <td style="text-align:right;color:#c8c8c8;font-size:13px">${r.laps||'—'}</td>
      <td class="${bCls}">${rBestStr}</td>
    </tr>`;
    if(hasLaps){
      const laps=r.lapTimes;
      // Personal bests for this pilot (green)
      const validLaps=laps.filter(l=>_isValidTime(l.lap));
      const pBestLap=validLaps.length?Math.min(...validLaps.map(l=>parseTimeSec(l.lap))):Infinity;
      const pBestS1=validLaps.length?Math.min(...validLaps.map(l=>parseTimeSec(l.s1)).filter(n=>!isNaN(n))):Infinity;
      const pBestS2=validLaps.length?Math.min(...validLaps.map(l=>parseTimeSec(l.s2)).filter(n=>!isNaN(n))):Infinity;
      // Header row
      html+=`<tr class="${rowId}" style="display:none;background:#0a0b10">
        <td style="text-align:center;color:#555;font-size:9px;text-transform:uppercase;letter-spacing:1px">#</td>
        <td colspan="${_sessHasGap?2:1}" style="color:#555;font-size:9px;text-transform:uppercase;letter-spacing:1px">LAP</td>
        <td style="color:#555;font-size:9px;text-transform:uppercase;letter-spacing:1px">S1</td>
        <td style="color:#555;font-size:9px;text-transform:uppercase;letter-spacing:1px">S2</td>
        <td></td>
      </tr>`;
      const lapRows=laps.map((l,li)=>{
        const lt=parseTimeSec(l.lap),ls1=parseTimeSec(l.s1),ls2=parseTimeSec(l.s2);
        const anomaly=!_isValidTime(l.lap);
        const aStyle=anomaly?'text-decoration:line-through;opacity:.45':'';
        // Lap time color: purple=session best, green=personal best, yellow=normal
        let lapCls='t-normal';
        if(!anomaly&&_validSec(lt)){
          if(Math.abs(lt-sessBestLap)<.005)lapCls='t-session';
          else if(Math.abs(lt-pBestLap)<.005)lapCls='t-personal';
        }
        // S1 color
        let s1Cls='t-normal';
        if(!anomaly&&!isNaN(ls1)){
          if(Math.abs(ls1-sessBestS1)<.005)s1Cls='t-session';
          else if(Math.abs(ls1-pBestS1)<.005)s1Cls='t-personal';
        }
        // S2 color
        let s2Cls='t-normal';
        if(!anomaly&&!isNaN(ls2)){
          if(Math.abs(ls2-sessBestS2)<.005)s2Cls='t-session';
          else if(Math.abs(ls2-pBestS2)<.005)s2Cls='t-personal';
        }
        // Highlight row if this is personal best lap
        const isPBest=!anomaly&&_validSec(lt)&&Math.abs(lt-pBestLap)<.005;
        const rowBg=isPBest?'background:#0d1a0d;border-left:2px solid #4ade80':'background:#08090d';
        return `<tr class="${rowId}" style="display:none;${rowBg}">
          <td style="text-align:center;color:#555;font-size:11px">${li+1}</td>
          <td colspan="${_sessHasGap?2:1}" class="${lapCls}" style="font-family:'Roboto Mono',monospace;font-size:13px;${aStyle}">${fmt(l.lap)}</td>
          <td class="${s1Cls}" style="font-family:'Roboto Mono',monospace;font-size:12px;${aStyle}">${fmt(l.s1)}</td>
          <td class="${s2Cls}" style="font-family:'Roboto Mono',monospace;font-size:12px;${aStyle}">${fmt(l.s2)}</td>
          <td></td>
        </tr>`;
      }).join('');
      html+=lapRows;
    }
    return html;
  }).join('');
  return `<div class="ovx"><table>
    <thead><tr>
      <th class="${clsPos}" style="text-align:center;cursor:pointer" onclick="sortSessTable('pos')">POS<span class="sort-arrow">${arrowPos}</span></th>
      <th class="tl">PILOT</th>
      <th style="text-align:center">KART</th>
      ${_sessHasGap?'<th>GAP</th>':''}
      <th style="text-align:right">LAPS</th>
      <th class="${clsBest}" style="cursor:pointer" onclick="sortSessTable('best')">BEST<span class="sort-arrow">${arrowBest}</span></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

  document.getElementById('ms-body').innerHTML=_renderSessionTable();
}

let _pendingDelete=null;
function confirmDelete(type,idOrDate,label){
  if(_role<1)return;
  _pendingDelete={type,idOrDate};
  let msg='',sub='';
  if(type==='session'){msg=`Delete <strong style="color:#fff">${label}</strong>?`;sub='This race will be removed from the archive and kart stats.';}
  else if(type==='day'){const cnt=sessions.filter(s=>s.date===idOrDate).length;msg=`Delete all races for <strong style="color:#fff">${idOrDate}</strong>?`;sub=`${cnt} race${cnt===1?'':'s'} will be deleted.`;}
  else{msg=`Delete <strong style="color:#e8392a">all races</strong>?`;sub=`${sessions.length} race${sessions.length===1?'':'s'} will be deleted.`;}
  document.getElementById('confirm-msg').innerHTML=msg;
  document.getElementById('confirm-sub').textContent=sub;
  document.getElementById('confirm-ok-btn').onclick=executeDelete;
  document.getElementById('modal-confirm').classList.add('open');
}
function executeDelete(){
  const{type,idOrDate}=_pendingDelete;
  let toDelete=[];
  if(type==='session'){
    toDelete=sessions.filter(s=>s.sid===idOrDate).map(s=>s._collectorId||s.sid).filter(Boolean);
    sessions=sessions.filter(s=>s.sid!==idOrDate);
  }else if(type==='day'){
    toDelete=sessions.filter(s=>s.date===idOrDate).map(s=>s._collectorId||s.sid).filter(Boolean);
    sessions=sessions.filter(s=>s.date!==idOrDate);
  }else{
    toDelete=sessions.map(s=>s._collectorId||s.sid).filter(Boolean);
    sessions=[];
  }
  if(window._deleteSessions&&toDelete.length)window._deleteSessions(toDelete);
  closeModal('modal-confirm');renderArchive();renderKarts();
}

let _kartDayFilter=new Set(),_rankFilter='all'; // empty Set = all days (last 7)
let _kartsFrom=0,_kartsTo=47;
function _kartsRangeInput(){
  const f=document.getElementById('karts-range-from'),t=document.getElementById('karts-range-to');
  let fv=parseInt(f.value),tv=parseInt(t.value);

function getAvailableDays(){return[...new Set(sessions.map(s=>s.date))].sort((a,b)=>parseDMY(b)-parseDMY(a));}
function _recentDays(){const now=new Date();const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-7);return getAvailableDays().filter(d=>parseDMY(d)>=cutoff);}
function buildKartsForDay(dayFilter){
  const fromTime=_mklSlotToTime(_kartsFrom),toTime=_mklSlotToTime(_kartsTo);
  const _recent7=_recentDays();
  let rel;
  if(dayFilter instanceof Set){
    rel=dayFilter.size===0?sessions.filter(s=>_recent7.includes(s.date)):sessions.filter(s=>dayFilter.has(s.date));
  }else{
    rel=dayFilter==='all'?sessions.filter(s=>_recent7.includes(s.date)):sessions.filter(s=>s.date===dayFilter);
  }
  rel=rel.filter(s=>(!s.time||s.time>=fromTime)&&(!s.time||s.time<=toTime));
  const map={};
  rel.forEach(s=>s.results.forEach(r=>{
    if(!map[r.kart])map[r.kart]={kart:r.kart,bestTime:9999,bestPilot:'',sids:new Set(),history:[]};
    const bv=_bestFromLaps(r);
    if(!isNaN(bv)&&bv<map[r.kart].bestTime){map[r.kart].bestTime=bv;map[r.kart].bestPilot=r.name;}
    map[r.kart].sids.add(s.sid);
    map[r.kart].history.push({session:s.title,sid:s.sid,date:s.date,pilot:r.name,best:r.best,lapTimes:r.lapTimes});
  }));
  return Object.values(map).map(k=>{
    const bt=k.bestTime<9999?k.bestTime.toFixed(3):'—';
    const rank=k.bestTime<43.5?'A':k.bestTime<44.0?'B':'C';
    return{...k,bestTime:bt,sessions:k.sids.size,rank};
  }).sort((a,b)=>parseTimeSec(a.bestTime)-parseTimeSec(b.bestTime));
}

let _enduranceSessions=[];
let _enduranceIdx=0;

function renderEndurance(){
  if(_enduranceSessions.length)return;// already loaded — don't reset
  // Try localStorage before showing loading text
  try{
    const raw=localStorage.getItem('nfs_endurance_list_v2');

      _enduranceSessions=JSON.parse(raw);
      if(!_enduranceData){_enduranceIdx=0;_renderEndurancePage();}
    }
  }catch(e){}

    document.getElementById('endurance-table-wrap').innerHTML='';
  }
  loadEnduranceSessions();
}

async function loadEnduranceSessions(){
  const COLLECTOR=window._COLLECTOR;
  const LIST_KEY='nfs_endurance_list_v2';
  const UNTIL_KEY='nfs_endurance_until_v1';
  const now=Date.now();
  const today=new Date().toISOString().slice(0,10);

  // Load cache immediately
  let cachedSessions=[];
  let checkedUntilMs=0;
  try{
    const raw=localStorage.getItem(LIST_KEY);
    if(raw)cachedSessions=JSON.parse(raw);
    const until=localStorage.getItem(UNTIL_KEY);
    if(until)checkedUntilMs=parseInt(until)||0;
  }catch(e){}
  if(cachedSessions.length){
    _enduranceSessions=cachedSessions;
    if(!_enduranceData){_enduranceIdx=0;_renderEndurancePage();}
  }

  // Skip network fetch if checked recently (< 5 min ago)
  if(checkedUntilMs&&(now-checkedUntilMs)<5*60*1000)return;

  try{
    // fromDate = date of last check (to catch same-day new sessions)
    const fromDate=checkedUntilMs?new Date(checkedUntilMs).toISOString().slice(0,10):'2026-01-01';
    const countsResp=await fetch(COLLECTOR+'/db/session-counts?from='+fromDate+'&to='+today);
    const dateCounts=await countsResp.json();
    const dates=dateCounts.map(d=>d.date);
    let newSessions=[];
    const DATE_BATCH=5;
    for(let i=0;i<dates.length;i+=DATE_BATCH){
      const batch=dates.slice(i,i+DATE_BATCH);
      const results=await Promise.all(batch.map(d=>
        fetch(COLLECTOR+'/db/sessions?date='+d).then(r=>r.json()).catch(()=>[])
      ));
      results.forEach(arr=>{if(Array.isArray(arr))newSessions.push(...arr);});
    }
    // Only probe sessions that ended after checkedUntil and not already in cache
    const cachedIds=new Set(cachedSessions.map(s=>s.id));
    const candidates=newSessions.filter(s=>{
      if(cachedIds.has(s.id)||!s.end_time||!s.start_time)return false;
      if(s.end_time<=checkedUntilMs)return false;
      return(s.end_time-s.start_time)>60*60*1000;
    });
    const probeResults=await Promise.all(candidates.map(s=>_probeEndurance(s.id)));
    const newEndurance=[];
    candidates.forEach((s,i)=>{if(probeResults[i]){s._teamCount=probeResults[i];newEndurance.push(s);}});
    const merged=[...cachedSessions,...newEndurance].sort((a,b)=>b.start_time-a.start_time);
    _enduranceSessions=merged;
    try{
      localStorage.setItem(LIST_KEY,JSON.stringify(merged));
      localStorage.setItem(UNTIL_KEY,String(now));
    }catch(e){}
    if(!_enduranceData){_enduranceIdx=0;_renderEndurancePage();}
  }catch(e){
    console.error('Endurance load error:',e);
    if(!_enduranceSessions.length)
      document.getElementById('endurance-header').innerHTML='<div style="color:#ef4444;padding:40px;text-align:center">Failed to load endurance data</div>';
  }
}

async function _probeEndurance(sessionId){
  const COLLECTOR=window._COLLECTOR;
  try{
    // Check /db/events for team structure (endurance has team object in events)
    const resp=await fetch(COLLECTOR+'/db/events?session='+encodeURIComponent(sessionId)+'&since=0');
    const events=await resp.json();
    if(!events.length)return false;
    const teamNums=new Set();
    for(const e of events){
      const t=e.data&&e.data.team;
      if(t&&t.number&&t.teamName)teamNums.add(t.number);
      if(teamNums.size>=3)return true;
    }
    return false;
  }catch(e){return false;}
}

function _renderEndurancePage(){
  if(!_enduranceSessions.length){
    document.getElementById('endurance-header').innerHTML='<div style="color:#8a8a8a;padding:40px;text-align:center">No endurance races found</div>';
    document.getElementById('endurance-table-wrap').innerHTML='';
    document.getElementById('endurance-timeline').style.display='none';
    return;
  }
  // Show list of all marathons
