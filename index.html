function _parseTotalOnTrack(str){
  if(!str||str==='00:00:00')return 0;
  // "HH:MM:SS" or "MM:SS.mmm"
  const p=str.split(':');
  if(p.length===3)return(parseInt(p[0])||0)*3600+(parseInt(p[1])||0)*60+(parseFloat(p[2])||0);
  if(p.length===2)return(parseInt(p[0])||0)*60+(parseFloat(p[1])||0);
  return parseFloat(str)||0;
}

function _buildStintTimes(teamNumber,events){
  // Returns {stintIndex: seconds} by tracking isOnPit transitions
  // Stint time = totalOnTrack(lastNonPitEvent) + (ts(pitEntryEvent) - ts(lastNonPitEvent))
  const result={};
  if(!events)return result;
  let wasOnPit=false;
  let lastNonPit=null;// {ts, totalOnTrack(sec)}
  let stintIdx=0;
  events.forEach(e=>{
    if(!e.data||!e.data.team||e.data.team.number!==teamNumber)return;
    const t=e.data.team;
    const onPit=t.isOnPit===true||t.isOnPit==='true';
    if(!onPit){
      const tot=_parseTotalOnTrack(t.totalOnTrack);
      lastNonPit={ts:e.ts,totalOnTrack:tot};
    }
    if(onPit&&!wasOnPit&&lastNonPit){
      // false→true: pit entry — compute stint time
      // stintTime = totalOnTrack(lastNonPit) + (ts(pitEntry) - ts(lastNonPit)) - totalOnTrack(pitEntry)
      const tsDelta=Math.max(0,(e.ts-lastNonPit.ts)/1000);
      const pitTot=_parseTotalOnTrack(t.totalOnTrack);
      result[stintIdx]=lastNonPit.totalOnTrack+tsDelta-pitTot;
      stintIdx++;
    }
    wasOnPit=onPit;
  });
  // Last stint: use last non-pit event's totalOnTrack + time since
  if(lastNonPit){
    result['last']=lastNonPit.totalOnTrack;
  }
  return result;
}

function _renderEnduranceStints(){
  const{team,teamLaps,pilotStats,raceBest}=_enduranceData._currentTeam;
  const stints=_buildTeamStints(teamLaps,team.number,_enduranceData.events);
  const briefName=n=>{const p=n.split(' ');return p.length>=2?p[0]+' '+p[1].charAt(0)+'.':n;};

  const hasKarts=stints.some(s=>s.kart);
  let html='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Stints</div>';
  html+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="color:#8a8a8a;text-transform:uppercase;font-size:10px;border-bottom:1px solid #1a1a1a">
      <th style="padding:6px 8px;text-align:left">#</th>
      <th style="padding:6px 8px;text-align:left">PILOT</th>
      ${hasKarts?'<th style="padding:6px 8px;text-align:center">KART</th>':''}
      <th style="padding:6px 8px;text-align:center">LAPS</th>
      <th style="padding:6px 8px;text-align:center">RANGE</th>
      <th style="padding:6px 8px;text-align:right">TIME</th>
      <th style="padding:6px 8px;text-align:right">AVG</th>
      <th style="padding:6px 8px;text-align:right">BEST</th>
      <th style="padding:6px 8px;text-align:right">WORST</th>
      <th style="padding:6px 8px;text-align:right">PIT</th>
    </tr></thead><tbody>`;

  stints.forEach((s,i)=>{
    const pitSet=_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[_enduranceData._currentTeam.team.number]||new Set();
    const normalLaps=s.laps.filter(l=>!l.isPit);
    const threshold=pilotStats[s.pilot]?pilotStats[s.pilot].threshold:999;
    const cleanTimes=normalLaps.map(l=>l.time).filter(t=>t<threshold);
    const avg=cleanTimes.length?(cleanTimes.reduce((a,b)=>a+b,0)/cleanTimes.length).toFixed(3):'—';
    const best=cleanTimes.length?Math.min(...cleanTimes):0;
    const worstLaps=i>0?normalLaps.slice(1):normalLaps;// skip pit-out lap (first lap of non-first stint)
    const worst=worstLaps.length?Math.max(...worstLaps.map(l=>l.time)):0;

    let stintTime='—';
    // Compute stint time from totalOnTrack in events
    // Find the isOnPit false→true transition that ends this stint
    // stintTimeSec = totalOnTrack(lastNonPitEvent) + (ts(pitEntryEvent) - ts(lastNonPitEvent))
    const teamNum=_enduranceData._currentTeam.team.number;
    if(!_enduranceData._stintTimesCache)_enduranceData._stintTimesCache=_buildStintTimes(teamNum,_enduranceData.events);
    const stintTimes=_enduranceData._stintTimesCache;
    if(stintTimes[i]!==undefined){
      stintTime=_fmtDuration(stintTimes[i]);
    }else if(i===stints.length-1){
      // Last stint (no pit after): use last event's totalOnTrack + ts delta
      const lastStintTime=stintTimes['last'];
      if(lastStintTime!==undefined)stintTime=_fmtDuration(lastStintTime);
    }

    const bestColor=best&&Math.abs(best-raceBest)<0.005?'color:#a78bfa':'color:#4ade80';
    const worstColor=worst>=threshold?'color:#ef4444':'color:#fbbf24';

    let pitStr='<span style="color:#8a8a8a">—</span>';
    if(s.pitLap){
      let pitSec=s.pitS2||0;
      if(s.pitExactTime){
        const pts=s.pitExactTime.replace('s','');
        if(pts.includes(':')){const pp=pts.split(':');pitSec=parseFloat(pp[0])*60+parseFloat(pp[1]);}
        else pitSec=parseFloat(pts)||0;
      }
      const pitCol=pitSec<90?'#ef4444':pitSec<=91?'#4ade80':'#fbbf24';
      const pitDisplay=s.pitExactTime||('~'+(s.pitS2-26).toFixed(3)+'s');
      pitStr=`<span style="color:${pitCol}">${pitDisplay}</span>`;
    }else if(i===stints.length-1){
      pitStr='<span style="color:#8a8a8a">— finish</span>';
    }

    const bg=i%2===0?'#0d0e15':'#0b0c12';
    html+=`<tr style="background:${bg};border-bottom:1px solid #111;cursor:pointer" onclick="_toggleEnduranceStintLaps(${i})">
      <td style="padding:6px 8px;color:#8a8a8a">${i+1}</td>
      <td style="padding:6px 8px;color:#fff">${briefName(s.pilot)}</td>
      ${hasKarts?`<td style="padding:6px 8px;text-align:center;color:#e8b830">${s.kart||'—'}</td>`:''}
      <td style="padding:6px 8px;text-align:center">${normalLaps.length}</td>
      <td style="padding:6px 8px;text-align:center;color:#8a8a8a">${s.startLap}–${s.endLap}</td>
      <td style="padding:6px 8px;text-align:right;color:#fff">${stintTime}</td>
      <td style="padding:6px 8px;text-align:right">${avg}</td>
      <td style="padding:6px 8px;text-align:right;${bestColor}">${best?best.toFixed(3):'—'}</td>
      <td style="padding:6px 8px;text-align:right;${worstColor}">${worst?worst.toFixed(3):'—'}</td>
      <td style="padding:6px 8px;text-align:right">${pitStr}</td>
    </tr>`;
    // Expandable laps row
    const colSpan=hasKarts?10:9;
    html+=`<tr id="et-stint-laps-${i}" style="display:none"><td colspan="${colSpan}" style="padding:0;background:#08090d">`;
    html+=`<table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'Roboto Mono',monospace">
      <thead><tr style="color:#555;font-size:10px;border-bottom:1px solid #1a1a1a">
        <th style="padding:2px 6px;text-align:right;width:36px">LAP</th>
        <th style="padding:2px 6px;text-align:right;width:60px">TIME</th>
        <th style="padding:2px 6px;text-align:right;width:50px">S1</th>
        <th style="padding:2px 6px;text-align:right;width:50px">S2</th>
        <th style="padding:2px 6px;text-align:right;width:30px">POS</th>
      </tr></thead><tbody>`;
    s.laps.forEach((l)=>{
      const lt=l.time;
      const isRealPit=l.isPit;// s2>60
      const isPitAffected=!isRealPit&&pitSet.has(l.lap_number);// pit-in/out
      const isAnomaly=!isRealPit&&!isPitAffected&&lt>=threshold;
      let col='color:#fbbf24';
      if(isRealPit)col='color:#ef4444';
      else if(isAnomaly)col='color:#ef4444';
      else if(isPitAffected)col='color:#8a8a8a';
      else if(best&&Math.abs(lt-raceBest)<0.005)col='color:#a78bfa';
      else if(best&&Math.abs(lt-best)<0.005)col='color:#4ade80';
      const timeStr=isRealPit&&lt>=60?(Math.floor(lt/60)+':'+(lt%60).toFixed(3).padStart(6,'0')):lt?lt.toFixed(3):'—';
      const rowBg=isRealPit?';background:#1a0505':isAnomaly?';background:#1a0f05':'';
      html+=`<tr style="border-bottom:1px solid #0e0f14${rowBg}">
        <td style="padding:2px 6px;color:#555;text-align:right">${l.lap_number}</td>
        <td style="padding:2px 6px;${col};text-align:right">${timeStr}</td>
        <td style="padding:2px 6px;color:#8a8a8a;text-align:right">${l.s1||'—'}</td>
        <td style="padding:2px 6px;color:${isRealPit?'#ef4444':'#8a8a8a'};text-align:right">${l.s2||'—'}</td>
        <td style="padding:2px 6px;color:#555;text-align:right">${l.pos||''}</td>
      </tr>`;
    });
    html+=`</tbody></table></td></tr>`;
  });
  html+='</tbody></table>';
  html+='<div style="font-size:11px;color:#8a8a8a;margin-top:6px">Click stint row to expand laps</div>';
  document.getElementById('et-stints').innerHTML=html;
  _enduranceData._stints=stints;
}

function _toggleEnduranceStintLaps(idx){
  const el=document.getElementById('et-stint-laps-'+idx);
  if(el){
    el.style.display=el.style.display==='none'?'':'none';
    const arrow=document.getElementById('et-stint-arrow-'+idx);
    if(arrow)arrow.textContent=el.style.display==='none'?'▶':'▼';
  }
}

function _renderEndurancePits(){
  const{team,teamLaps}=_enduranceData._currentTeam;
  const stints=_enduranceData._stints;
  let html='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Pit Stops</div>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:8px">';
  let pitIdx=0;
  stints.forEach((s,i)=>{
    if(!s.pitLap)return;
    const nextStint=stints[i+1];
    const pitDisplay=s.pitExactTime||('~'+(s.pitS2-26).toFixed(3)+'s');
    let pitSec=s.pitS2||0;
    if(s.pitExactTime){
      const pts=s.pitExactTime.replace('s','');
      if(pts.includes(':')){const pp=pts.split(':');pitSec=parseFloat(pp[0])*60+parseFloat(pp[1]);}
      else pitSec=parseFloat(pts)||0;
    }
    const pitCol=pitSec<90?'#ef4444':pitSec<=91?'#4ade80':'#fbbf24';
    const pilotOut=s.pilot;
    const pilotIn=nextStint?nextStint.pilot:s.pilot;
    const briefName=n=>{const p=n.split(' ');return p.length>=2?p[0]+' '+p[1].charAt(0)+'.':n;};
    html+=`<div style="background:#0a0b10;border:1px solid #1a1a1a;border-radius:6px;padding:8px 12px;font-size:12px;min-width:140px">
      <div style="color:#8a8a8a;font-size:10px">PIT ${pitIdx+1} · Lap ${s.pitLap}</div>
      <div style="color:${pitCol};font-weight:600">${pitDisplay}</div>
      <div style="color:#8a8a8a;font-size:11px">${briefName(pilotOut)} → ${briefName(pilotIn)}</div>
    </div>`;
    pitIdx++;
  });
  html+='</div>';
  document.getElementById('et-pits').innerHTML=html;
}

function _renderEnduranceChart(){
  const{teamLaps}=_enduranceData._currentTeam;
  const stints=_enduranceData._stints;
  const teams=_enduranceData.teams;
  const totalTeams=teams.length;
  const posData=teamLaps.filter(l=>_parseS2sec(l.s2)<=60).map(l=>({lap:l.lap_number,pos:l.position}));
  if(!posData.length){document.getElementById('et-chart').innerHTML='';return;}
  const maxLap=Math.max(...posData.map(d=>d.lap));
  const minPos=1;
  const maxPos=totalTeams;
  const W=700,H=160,PAD_L=30,PAD_R=10,PAD_T=10,PAD_B=20;
  const chartW=W-PAD_L-PAD_R;
  const chartH=H-PAD_T-PAD_B;
  const xScale=lap=>(lap/maxLap)*chartW+PAD_L;
  const yScale=pos=>((pos-minPos)/(maxPos-minPos))*chartH+PAD_T;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">`;
  for(let p=1;p<=maxPos;p+=Math.max(1,Math.floor(maxPos/5))){
    const y=yScale(p);
    svg+=`<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#1a1a1a" stroke-width="0.5"/>`;
    svg+=`<text x="${PAD_L-4}" y="${y+3}" fill="#8a8a8a" font-size="9" text-anchor="end">P${p}</text>`;
  }
  const lapStep=Math.max(1,Math.round(maxLap/7));
  for(let l=0;l<=maxLap;l+=lapStep){
    svg+=`<text x="${xScale(l)}" y="${H-2}" fill="#8a8a8a" font-size="9" text-anchor="middle">${l}</text>`;
  }
  stints.forEach(s=>{
    if(s.pitLap){
      const x=xScale(s.pitLap);
      svg+=`<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${H-PAD_B}" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5"/>`;
    }
  });
  const points=posData.map(d=>`${xScale(d.lap)},${yScale(d.pos)}`).join(' ');
  svg+=`<polyline points="${points}" fill="none" stroke="#e8b830" stroke-width="2"/>`;
  svg+='</svg>';
  let html='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Position Chart</div>';
  html+=`<div style="background:#0a0b10;border:1px solid #1a1a1a;border-radius:6px;padding:12px;position:relative">
    ${svg}
    <div style="position:absolute;right:16px;top:16px;font-size:10px;color:#8a8a8a"><span style="color:#ef4444">┊</span> pit stop</div>
  </div>`;
  document.getElementById('et-chart').innerHTML=html;
}

function _renderEnduranceLapTimes(){
  const{pilotStats,raceBest}=_enduranceData._currentTeam;
  const stints=_enduranceData._stints;
  const briefName=n=>{const p=n.split(' ');return p.length>=2?p[0]+' '+p[1].charAt(0)+'.':n;};
  let html='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Lap Times</div>';
  stints.forEach((s,i)=>{
    const normalLaps=s.laps.filter(l=>!l.isPit);
    const threshold=pilotStats[s.pilot]?pilotStats[s.pilot].threshold:999;
    let stintTime='';
    if(i>0&&stints[i-1].endTs&&s.endTs){
      stintTime=_fmtDuration((s.endTs-stints[i-1].endTs)/1000);
    }else if(normalLaps.length>=2){
      stintTime=_fmtDuration((s.endTs-s.startTs)/1000);
    }
    const pilotBest=pilotStats[s.pilot]?pilotStats[s.pilot].best:0;
    html+=`<div style="background:#0a0b10;border:1px solid #1a1a1a;border-radius:4px;margin-bottom:4px">
      <div style="display:flex;justify-content:space-between;padding:8px 12px;font-size:12px;cursor:pointer" onclick="_toggleEnduranceStintLaps(${i})">
        <span style="color:#fff">Stint ${i+1} — ${briefName(s.pilot)} <span style="color:#8a8a8a">(laps ${s.startLap}–${s.endLap}, ${normalLaps.length} laps${stintTime?', '+stintTime:''})</span></span>
        <span style="color:#8a8a8a" id="et-stint-arrow-${i}">▶</span>
      </div>
      <div id="et-stint-laps-${i}" style="display:none;padding:4px 8px;max-height:300px;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'Roboto Mono',monospace">
          <thead><tr style="color:#8a8a8a;font-size:10px">
            <th style="padding:3px 6px;text-align:left">LAP</th>
            <th style="padding:3px 6px;text-align:right">TIME</th>
            <th style="padding:3px 6px;text-align:right">S1</th>
            <th style="padding:3px 6px;text-align:right">S2</th>
            <th style="padding:3px 6px;text-align:right">POS</th>
          </tr></thead><tbody>`;
    s.laps.forEach(l=>{
      let timeColor='color:#fbbf24';
      let rowBg='';
      if(l.isPit){
        timeColor='color:#ef4444';
        rowBg='background:#1a0505;';
      }else if(l.time>=threshold){
        timeColor='color:#ef4444';
      }else if(Math.abs(l.time-raceBest)<0.005){
        timeColor='color:#a78bfa';
      }else if(pilotBest&&Math.abs(l.time-pilotBest)<0.005){
        timeColor='color:#4ade80';
      }
      let timeStr;
      if(l.isPit){
        const m=Math.floor(l.time/60);
        const sec=(l.time%60).toFixed(3).padStart(6,'0');
        timeStr=m+':'+sec;
      }else{
        timeStr=l.time.toFixed(3);
      }
      html+=`<tr style="${rowBg}border-bottom:1px solid #111">
        <td style="padding:2px 6px;color:#8a8a8a">${l.lap_number}</td>
        <td style="padding:2px 6px;text-align:right;${timeColor}">${timeStr}</td>
        <td style="padding:2px 6px;text-align:right">${l.s1||''}</td>
        <td style="padding:2px 6px;text-align:right;${l.isPit?'color:#ef4444':''}">${l.s2||''}</td>
        <td style="padding:2px 6px;text-align:right;color:#8a8a8a">${l.pos}</td>
      </tr>`;
    });
    html+='</tbody></table></div></div>';
  });
  document.getElementById('et-laps').innerHTML=html;
}

function closeModal(id){const el=document.getElementById(id);el.classList.remove('open');if(el.dataset.displayOpen)el.style.display='none';}
function openModalDisplay(id){const el=document.getElementById(id);el.dataset.displayOpen='1';el.style.display='flex';}
function bgClose(id,e){if(e.target===document.getElementById(id))closeModal(id);}

window.addEventListener('DOMContentLoaded',()=>{
  const _mlBase=_currentUrl.replace(/\/timing$/,'');
  fetch(_mlBase+'/min-lap').then(r=>r.json()).then(d=>{if(d.minValidLap){_minValidLap=d.minValidLap;localStorage.setItem('nfs_min_lap',_minValidLap);}}).catch(()=>{});
  renderEndurance();
});
