let _enduranceData=null;
const _enduranceCache={};// {sessionId: enduranceData}

async function _loadEnduranceTeamData(sessionId){
  const COLLECTOR=window._COLLECTOR;
  try{
    const lapsResp=await fetch(COLLECTOR+'/db/laps?session='+encodeURIComponent(sessionId)).then(r=>r.json());
    // Paginate /db/events (10k limit per page)
    let eventsResp=[];
    let evSince=0;
    for(let page=0;page<20;page++){
      const batch=await fetch(COLLECTOR+'/db/events?session='+encodeURIComponent(sessionId)+'&since='+evSince).then(r=>r.json()).catch(()=>[]);
      if(!batch.length)break;
      eventsResp=eventsResp.concat(batch);
      evSince=batch[batch.length-1].ts+1;
      if(batch.length<10000)break;
    }

    // Build teams from /db/laps (kart = team number)
    const byKart={};
    lapsResp.forEach(l=>{
      if(!byKart[l.kart])byKart[l.kart]={laps:[],pilots:new Set(),bestLap:Infinity,bestS1:Infinity,bestS2:Infinity,bestLapStr:'',bestS1Str:'',bestS2Str:''};
      const k=byKart[l.kart];
      k.laps.push(l);
      if(!l.pilot.startsWith('Карт '))k.pilots.add(l.pilot);
      const lt=parseTimeSec(l.lap_time||'');
      const s1v=parseFloat(l.s1)||Infinity;
      const s2v=_parseS2sec(l.s2);
      if(lt>0&&lt<k.bestLap){k.bestLap=lt;k.bestLapStr=l.lap_time;}
      if(s1v<k.bestS1){k.bestS1=s1v;k.bestS1Str=l.s1;}
      if(s2v>0&&s2v<60&&s2v<k.bestS2){k.bestS2=s2v;k.bestS2Str=l.s2;}
    });

    // Find race-wide bests
    let raceBestLap=Infinity,raceBestS1=Infinity,raceBestS2=Infinity;
    let raceBestLapStr='',raceBestS1Str='',raceBestS2Str='';
    Object.values(byKart).forEach(k=>{
      if(k.bestLap<raceBestLap){raceBestLap=k.bestLap;raceBestLapStr=k.bestLapStr;}
      if(k.bestS1<raceBestS1){raceBestS1=k.bestS1;raceBestS1Str=k.bestS1Str;}
      if(k.bestS2<raceBestS2){raceBestS2=k.bestS2;raceBestS2Str=k.bestS2Str;}
    });
    const meta={bestLapRace:raceBestLapStr,bestS1Race:raceBestS1Str,bestS2Race:raceBestS2Str};

    // If events have team data, use it for enrichment (teamName, position, lag etc)
    const teamFromEvents={};
    eventsResp.forEach(e=>{
      if((e.type||e.event_type)==='lap'&&e.data&&e.data.team){
        teamFromEvents[e.data.team.number]=e.data.team;
        if(e.data.meta){
          if(e.data.meta.bestLapRace)meta.bestLapRace=e.data.meta.bestLapRace;
          if(e.data.meta.bestS1Race)meta.bestS1Race=e.data.meta.bestS1Race;
          if(e.data.meta.bestS2Race)meta.bestS2Race=e.data.meta.bestS2Race;
        }
      }
    });

    // Build pit laps per team from isOnPit transitions in events
    // isOnPit=true fires on lap N (pit entry), but the actual pit lap is N+1 (long s2)
    const pitLapsMap={};// {teamNum: Set of pit lap numbers}
    const pitEntryTsMap={};// {teamNum: {lapNum+1: entryTs}} — timestamp when pit started
    const _pState={};
    eventsResp.forEach(e=>{
      const d=e.data;if(!d)return;
      const t=d.team;if(!t||!t.number)return;
      const num=t.number;
      const onPit=t.isOnPit===true||t.isOnPit==='true';
      const lap=d.lapNumber||parseInt(t.lapCount)||0;
      const ts=e.ts||0;
      if(!_pState[num])_pState[num]={wasOnPit:false,pitEntryLap:0,pitEntryTs:0};
      if(!pitLapsMap[num])pitLapsMap[num]=new Set();
      if(!pitEntryTsMap[num])pitEntryTsMap[num]={};
      if(onPit&&!_pState[num].wasOnPit&&lap>0){_pState[num].pitEntryLap=lap;_pState[num].pitEntryTs=ts;}
      if(!onPit&&_pState[num].wasOnPit&&_pState[num].pitEntryLap>0){
        const pitLap=_pState[num].pitEntryLap+1;
        pitLapsMap[num].add(pitLap);
        pitEntryTsMap[num][pitLap]=_pState[num].pitEntryTs;
        _pState[num].pitEntryLap=0;
      }
      _pState[num].wasOnPit=onPit;
    });

    // Sort teams by lap count desc (position proxy when events unavailable)
    const kartNums=Object.keys(byKart).map(Number).filter(n=>byKart[n].pilots.size>=2);
    const teams=kartNums.map((kn,i)=>{
      const k=byKart[kn];
      const maxLap=Math.max(...k.laps.map(l=>l.lap_number));
      const evt=teamFromEvents[String(kn)];
      // Compute clean avg
      const pilots=[...k.pilots];
      let cleanTimes=[];
      pilots.forEach(p=>{
        const ps=pitLapsMap[String(kn)]||new Set();
        const pTimes=k.laps.filter(l=>l.pilot===p&&(ps.size>0?!ps.has(l.lap_number):_parseS2sec(l.s2)<=60)).map(l=>_enduranceLapTime(l)).filter(t=>t>0&&t<300);
        if(!pTimes.length)return;
        const rawAvg=pTimes.reduce((a,b)=>a+b,0)/pTimes.length;
        pTimes.filter(t=>t<rawAvg*1.1).forEach(t=>cleanTimes.push(t));
      });
      const avgVal=cleanTimes.length?(cleanTimes.reduce((a,b)=>a+b,0)/cleanTimes.length):0;
      // Count pit laps from isOnPit events, fallback to s2>60 + implicit
      const ps=pitLapsMap[String(kn)]||new Set();
      let pitLaps=ps.size>0?ps.size:k.laps.filter(l=>_parseS2sec(l.s2)>60).length;
      if(!ps.size){const sortedLaps=[...k.laps].sort((a,b)=>a.lap_number-b.lap_number);
      for(let i=1;i<sortedLaps.length;i++){
        if(sortedLaps[i].lap_number-sortedLaps[i-1].lap_number>1&&sortedLaps[i].pilot!==sortedLaps[i-1].pilot&&!sortedLaps[i].pilot.startsWith('Карт ')&&!sortedLaps[i-1].pilot.startsWith('Карт '))pitLaps++;
      }}
      return{
        number:String(kn),
        teamName:evt?evt.teamName:('Team #'+kn),
        position:evt?parseInt(evt.position):0,
        lapCount:evt?evt.lapCount:maxLap,
        bestLap:k.bestLapStr,
        midLap:avgVal?avgVal.toFixed(3):'',
        lag:evt?(evt.lag||'0'):'',
        pitstops:evt?parseInt(evt.pitstops)||pitLaps:pitLaps,
        pilots,
        pilotName:evt?evt.pilotName:''
      };
    });
    // Sort by position (from events) or lap count desc
    teams.sort((a,b)=>{
      if(a.position&&b.position)return a.position-b.position;
      return parseInt(b.lapCount)-parseInt(a.lapCount);
    });
    // Assign position if not from events
    if(!teams[0]||!teams[0].position)teams.forEach((t,i)=>t.position=i+1);

    _enduranceData={teams,meta,laps:lapsResp,events:eventsResp,pitTimes:{},joins:[],sessionId,pitLapsMap,pitEntryTsMap};
    _enduranceCache[sessionId]=_enduranceData;
    // Persist to localStorage (Sets → arrays for JSON serialization)
    try{
      const toStore={..._enduranceData};
      toStore.pitLapsMap={};
      Object.keys(pitLapsMap).forEach(k=>{toStore.pitLapsMap[k]=[...pitLapsMap[k]];});
      localStorage.setItem('nfs_ed_v1_'+sessionId,JSON.stringify(toStore));
    }catch(e){}
    _renderEnduranceTeams();
  }catch(e){
    console.error('Endurance team data error:',e);
    document.getElementById('endurance-table-wrap').innerHTML='<div style="color:#ef4444;text-align:center;padding:20px">Failed to load team data</div>';
  }
}

/* ── REPLAY ── */
let _replayInterval=null;
let _replayT=0;
const _replaySpeeds=[null,0.25,0.5,1,2,4,8];// null = real time (1s interval)
let _replaySpeedIdx=3;// default 1x

function _replayBsearch(laps,T){
  let lo=0,hi=laps.length-1,res=-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    if(laps[mid].ts<=T){res=mid;lo=mid+1;}
    else{hi=mid-1;}
  }
  return res;
}

function _buildReplayState(T){
  if(!_enduranceData)return[];
  const laps=_enduranceData.laps;
  const idx=_replayBsearch(laps,T);
  if(idx<0)return[];

  const byKart={};
  for(let i=0;i<=idx;i++){
    const l=laps[i];
    if(!byKart[l.kart])byKart[l.kart]={laps:[],pilots:new Set(),bestLap:Infinity,bestLapStr:'',lastLap:null};
    const k=byKart[l.kart];
    k.laps.push(l);
    if(!l.pilot.startsWith('Карт '))k.pilots.add(l.pilot);
    const s2sec=_parseS2sec(l.s2);
    const isNormal=s2sec>0&&s2sec<=60;
    if(isNormal){
      const lt=parseTimeSec(l.lap_time||'');
      if(lt>0&&lt<k.bestLap){k.bestLap=lt;k.bestLapStr=l.lap_time;}
    }
    k.lastLap=l;
  }

  let raceBest=Infinity;
  Object.values(byKart).forEach(k=>{if(k.bestLap<raceBest)raceBest=k.bestLap;});

  const teamNums=new Set(_enduranceData.teams.map(t=>t.number));
  const rows=[];
  Object.entries(byKart).forEach(([kn,k])=>{
    if(!teamNums.has(String(kn)))return;
    const pitSet=_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[String(kn)]||new Set();
    const replayLapNums=new Set(k.laps.map(l=>l.lap_number));
    const normalLaps=k.laps.filter(l=>pitSet.size>0?!pitSet.has(l.lap_number):_parseS2sec(l.s2)<=60);
    let pitCount=pitSet.size>0?k.laps.filter(l=>pitSet.has(l.lap_number)).length:k.laps.filter(l=>_parseS2sec(l.s2)>60).length;
    if(!pitSet.size){for(let i=1;i<k.laps.length;i++){
      if(k.laps[i].lap_number-k.laps[i-1].lap_number>1&&k.laps[i].pilot!==k.laps[i-1].pilot&&!k.laps[i].pilot.startsWith('Карт ')&&!k.laps[i-1].pilot.startsWith('Карт '))pitCount++;
    }}
    const times=normalLaps.map(l=>parseTimeSec(l.lap_time||'')).filter(t=>t>0&&t<300);
    let avg=0;
    if(times.length){
      const rawAvg=times.reduce((a,b)=>a+b,0)/times.length;
      const clean=times.filter(t=>t<rawAvg*1.1);
      avg=clean.length?clean.reduce((a,b)=>a+b,0)/clean.length:rawAvg;
    }
    let pilot=k.lastLap.pilot;
    for(let i=k.laps.length-1;i>=0;i--){
      if(!k.laps[i].pilot.startsWith('Карт ')){pilot=k.laps[i].pilot;break;}
    }
    // Find current state from events at time T (scan forward to track isOnPit transitions)
    let physKart='',evtLag='',evtPos=0,evtLapCount=-1;
    let evtLastLap='',evtS1='',evtS2='',evtPilot='',evtTs=0;
    let evtPitCount=0,evtOnPit=false,_wasOnPit=false,evtOnTrack='';
    const evts=_enduranceData.events;
    for(let ei=0;ei<evts.length;ei++){
      const e=evts[ei];if(e.ts>T)break;
      const d=e.data;if(!d)continue;
      const et=d.team;if(!et||et.number!==String(kn))continue;
      if(et.kart&&et.kart!=='0')physKart=et.kart;
      if(et.lag!=null)evtLag=et.lag;
      if(et.position)evtPos=parseInt(et.position)||0;
      if(et.lapCount!=null)evtLapCount=parseInt(et.lapCount)||0;
      if(et.lastLap)evtLastLap=et.lastLap;
      if(et.lastLapS1)evtS1=et.lastLapS1;
      if(et.lastLapS2)evtS2=et.lastLapS2;
      if(et.pilotName&&!et.pilotName.startsWith('Карт '))evtPilot=et.pilotName;
      if(et.totalOnTrack)evtOnTrack=et.totalOnTrack;
      evtTs=e.ts;
      const onPit=et.isOnPit===true||et.isOnPit==='true';
      if(!onPit&&_wasOnPit)evtPitCount++;// pit completed
      _wasOnPit=onPit;
      evtOnPit=onPit;
    }
    const lapsLapCount=k.laps.length?Math.max(...k.laps.map(l=>l.lap_number||0)):0;
    const teamInfo=_enduranceData.teams.find(t=>t.number===String(kn));
    rows.push({
      number:String(kn),
      teamName:teamInfo?teamInfo.teamName:('Team #'+kn),
      kart:physKart,
      lapCount:evtLapCount>lapsLapCount?evtLapCount:lapsLapCount,
      lastLap:evtLastLap||k.lastLap.lap_time||'',
      s1:evtS1||k.lastLap.s1||'',
      s2:evtS2||k.lastLap.s2||'',
      bestLap:k.bestLapStr,
      bestSec:k.bestLap,
      avg:avg?avg.toFixed(3):'',
      pits:evtPitCount,
      onPit:evtOnPit,
      onTrack:evtOnTrack,
      pilot:evtPilot||pilot,
      lastTs:evtTs||k.lastLap.ts||0,
      lag:evtLag,
      evtPos,
      raceBest
    });
  });

  // Sort by event position if available, fallback to lapCount/lastTs
  const hasEvtPos=rows.some(r=>r.evtPos>0);
  if(hasEvtPos)rows.sort((a,b)=>(a.evtPos||999)-(b.evtPos||999));
  else rows.sort((a,b)=>b.lapCount-a.lapCount||(a.lastTs-b.lastTs));
  rows.forEach((r,i)=>r.position=i+1);
  return rows;
}

function _renderReplayTable(rows){
  const wrap=document.getElementById('endurance-table-wrap');
  if(!rows.length){
    wrap.innerHTML='<div style="color:#8a8a8a;text-align:center;padding:40px">Race not started yet</div>';
    return;
  }
  const briefName=n=>{const p=n.split(' ');return p.length>=2?p[0]+' '+p[1].charAt(0)+'.':n;};
  let html=`<table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="color:#8a8a8a;text-transform:uppercase;font-size:11px;border-bottom:1px solid #1a1a1a">
      <th style="padding:8px 12px;text-align:left;width:40px">POS</th>
      <th style="padding:8px 12px;text-align:right">TEAM</th>
      <th style="padding:8px 12px;text-align:center;width:50px">KART</th>
      <th style="padding:8px 12px;text-align:center;width:60px">LAPS</th>
      <th style="padding:8px 12px;text-align:right;width:90px">LAST</th>
      <th class="e-detail" style="padding:8px 12px;text-align:right;width:70px">S1</th>
      <th class="e-detail" style="padding:8px 12px;text-align:right;width:70px">S2</th>
      <th style="padding:8px 12px;text-align:right;width:90px">BEST</th>
      <th style="padding:8px 12px;text-align:right;width:80px">AVG</th>
      <th style="padding:8px 12px;text-align:right;width:120px">GAP</th>
      <th class="e-detail" style="padding:8px 12px;text-align:right;width:70px">OnTrack</th>
      <th style="padding:8px 12px;text-align:right;width:50px">PITS</th>
    </tr></thead><tbody>`;

  rows.forEach((r,i)=>{
    const bestClass=Math.abs(r.bestSec-r.raceBest)<0.005?'color:#a78bfa':'color:#4ade80';
    let gap;
    if(i===0){gap='<span style="color:#4ade80">LEADER</span>';}
    else if(r.lag){
      const lagStr=String(r.lag);
      const lm=lagStr.match(/^(\d+)L\+(.+)$/);
      if(lm){
        const laps=parseInt(lm[1]);
        const secs=parseFloat(lm[2]);
        gap=`<span style="color:#fbbf24">+${laps}L+${secs.toFixed(2)}</span>`;
      } else {
        const lagVal=parseFloat(lagStr);
        if(isNaN(lagVal)||lagVal===0){
          const prev=rows[i-1];
          const lapDiff=prev.lapCount-r.lapCount;
          if(lapDiff>0)gap=`<span style="color:#fbbf24">+${lapDiff} lap${lapDiff>1?'s':''}</span>`;
          else gap=`<span style="color:#fbbf24">+0.00</span>`;
        } else {
          gap=`<span style="color:#fbbf24">+${lagVal.toFixed(2)}</span>`;
        }
      }
    }
    else{
      const prev=rows[i-1];
      const lapDiff=prev.lapCount-r.lapCount;
      if(lapDiff>0)gap=`<span style="color:#fbbf24">+${lapDiff} lap${lapDiff>1?'s':''}</span>`;
      else{const dt=((r.lastTs-prev.lastTs)/1000).toFixed(2);gap=`<span style="color:#fbbf24">+${dt}</span>`;}
    }
    const bg=i%2===0?'#0d0e15':'#0b0c12';
    html+=`<tr style="background:${bg};border-bottom:1px solid #111;cursor:pointer" onclick="_openEnduranceTeamModal('${r.number}')">
      <td style="padding:8px 12px;${r.position===1?'color:#e8b830;font-weight:bold':'color:#ddd'}">${r.position}</td>
      <td style="padding:8px 12px;color:#fff;font-weight:600;white-space:nowrap;text-align:right">${r.teamName} <span style="color:#8a8a8a;font-weight:normal;font-size:11px">#${r.number}</span><br><span style="color:#8a8a8a;font-weight:normal;font-size:11px">${briefName(r.pilot)}</span></td>
      <td style="padding:8px 12px;text-align:center;color:#e8b830">${r.kart||'—'}</td>
      <td style="padding:8px 12px;text-align:center">${r.lapCount}</td>
      <td style="padding:8px 12px;text-align:right;color:#fbbf24;font-family:'Roboto Mono',monospace">${r.lastLap||'—'}</td>
      <td class="e-detail" style="padding:8px 12px;text-align:right;font-family:'Roboto Mono',monospace">${r.s1||'—'}</td>
      <td class="e-detail" style="padding:8px 12px;text-align:right;font-family:'Roboto Mono',monospace">${_parseS2sec(r.s2)>60?'<span style="color:#ef4444">PIT</span>':r.s2||'—'}</td>
      <td style="padding:8px 12px;text-align:right;${bestClass};font-family:'Roboto Mono',monospace">${r.bestLap||'—'}</td>
      <td style="padding:8px 12px;text-align:right;font-family:'Roboto Mono',monospace">${r.avg||'—'}</td>
      <td style="padding:8px 12px;text-align:right">${gap}</td>
      <td class="e-detail" style="padding:8px 12px;text-align:right;color:#8a8a8a;font-family:'Roboto Mono',monospace;font-size:12px">${(()=>{if(!r.onTrack)return'—';const s=_parseTotalOnTrack(r.onTrack);if(!s)return'—';const m=Math.floor(s/60),sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');})()}</td>
      <td style="padding:8px 12px;text-align:right">${r.onPit?'<span style="color:#ef4444">PIT</span>':r.pits}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

function _setEnduranceTab(tab){
  document.getElementById('e-tab-replay').classList.toggle('active',tab==='replay');
  document.getElementById('e-tab-stats').classList.toggle('active',tab==='stats');
  document.getElementById('endurance-replay-wrap').style.display=tab==='replay'?'':'none';

  if(tab==='stats'&&!_enduranceData._statsRendered){_enduranceData._statsRendered=true;_renderEnduranceStats();}
}

/* ─── ENDURANCE STATISTICS ─── */
function _computeKartAnalysis(){
  const{laps,events,pitLapsMap,teams}=_enduranceData;
  // Build physKart map from events: for each (teamNum, lapNumber) → physKart
  const physKartByTeamLap={};
  events.forEach(e=>{
    const t=e.data&&e.data.team;
    if(!t||!t.number||!t.kart||t.kart==='0')return;
    physKartByTeamLap[t.number+'_'+t.lapCount]=t.kart;
  });
  // Build combos: {pilot|physKart → {pilot, physKart, teamNum, teamName, times[]}}
  const combos={};
  const teamByNum={};
  teams.forEach(t=>{teamByNum[t.number]=t;});
  laps.forEach(l=>{
    const teamNum=String(l.kart);
    const pilot=l.pilot;
    if(!pilot||pilot.startsWith('Карт '))return;
    const lapNum=l.lap_number;
    // Skip pit laps
    const ps=pitLapsMap&&pitLapsMap[teamNum]||new Set();
    if(ps.size>0&&ps.has(lapNum))return;
    if(_parseS2sec(l.s2)>60)return;
    // Get physical kart
    const pk=physKartByTeamLap[teamNum+'_'+lapNum];
    if(!pk)return;
    const lt=_enduranceLapTime(l);
    if(!lt||lt<=0||lt>120)return;
    const key=pilot+'|'+pk;
    if(!combos[key])combos[key]={pilot,physKart:pk,teamNum,teamName:(teamByNum[teamNum]||{}).teamName||'',times:[]};
    combos[key].times.push(lt);
  });
  // Filter anomalies: remove laps > 1.1× combo average
  Object.values(combos).forEach(c=>{
    const raw=c.times.reduce((a,b)=>a+b,0)/c.times.length;
    c.times=c.times.filter(t=>t<raw*1.1);
    c.avg=c.times.length?c.times.reduce((a,b)=>a+b,0)/c.times.length:0;
    c.count=c.times.length;
  });
  // Remove empty combos and combos with < 10 laps
  const validCombos=Object.values(combos).filter(c=>c.count>=10);
  // Simple Pilot-Normalized Delta algorithm:
  // 1. Each pilot's global baseline = weighted avg across all their combos
  // 2. Kart effect = weighted avg of (combo_avg - pilot_baseline) across combos on that kart
  // 3. Center so mean kart effect = 0
  const allKarts=[...new Set(validCombos.map(c=>c.physKart))];
  // Pilot global baseline
  const pilotEffect={};
  const allPilots=[...new Set(validCombos.map(c=>c.pilot))];
  allPilots.forEach(p=>{
    const pCombos=validCombos.filter(c=>c.pilot===p);
    let wSum=0,wCnt=0;
    pCombos.forEach(c=>{wSum+=c.avg*c.count;wCnt+=c.count;});
    pilotEffect[p]=wCnt?wSum/wCnt:0;
  });
  // Pilot quality weight: best_avg / pilot_avg (faster pilot → weight closer to 1)
  const bestPilotAvg=Math.min(...Object.values(pilotEffect));
  const pilotQuality={};
  allPilots.forEach(p=>{pilotQuality[p]=bestPilotAvg/pilotEffect[p];});
  // Kart effect = weighted avg delta, weight = laps × pilot_quality
  const kartEffect={};
  allKarts.forEach(k=>{
    const kCombos=validCombos.filter(c=>c.physKart===k);
    let wSum=0,wCnt=0;
    kCombos.forEach(c=>{
      const w=c.count*(pilotQuality[c.pilot]||1);
      wSum+=(c.avg-pilotEffect[c.pilot])*w;
      wCnt+=w;
    });
    kartEffect[k]=wCnt?wSum/wCnt:0;
  });
  // Center
  const kVals=Object.values(kartEffect);
  const kMean=kVals.reduce((a,b)=>a+b,0)/kVals.length;
  allKarts.forEach(k=>{kartEffect[k]-=kMean;});
  return{kartEffect,pilotEffect,combos:validCombos,teamByNum};
}

function _renderEnduranceStats(){
  const{combos}=_computeKartAnalysis();
  const briefName=n=>{const p=n.split(' ');return p.length>=2?p[0]+' '+p[1].charAt(0)+'.':n;};
  const tblStyle='width:100%;border-collapse:collapse;font-size:13px';
  const thStyle='padding:8px 12px;color:#8a8a8a;text-transform:uppercase;font-size:11px;border-bottom:1px solid #1a1a1a;text-align:right';
  const thL=thStyle+';text-align:left';
  const tdS='padding:8px 12px';
  const rowBg=i=>i%2===0?'#0d0e15':'#0b0c12';

  // Group by physKart, sort karts numerically
  const byKart={};
  combos.forEach(c=>{
    if(!byKart[c.physKart])byKart[c.physKart]=[];
    byKart[c.physKart].push(c);
  });
  const sortedKarts=Object.keys(byKart).sort((a,b)=>+a-+b);

  let html=`<table style="${tblStyle};margin-top:16px"><thead><tr>
    <th style="${thStyle};text-align:center;width:60px">Kart</th>
    <th style="${thStyle}">Pilot</th>
    <th style="${thStyle};width:80px">AVG</th>
    <th style="${thStyle};width:80px">Best</th>
    <th style="${thStyle};width:60px">Laps</th>
  </tr></thead><tbody>`;

  let rowIdx=0;
  const sep='border-top:2px solid #2a2a3a';
  sortedKarts.forEach((k,ki)=>{
    const pilots=byKart[k].sort((a,b)=>a.avg-b.avg);
    pilots.forEach((c,pi)=>{
      const best=Math.min(...c.times).toFixed(3);
      const sepStyle=pi===0&&ki>0?sep:'';
      html+=`<tr style="background:${rowBg(rowIdx++)};${sepStyle}">
        <td style="${tdS};text-align:center;color:${pi===0?'#e8b830':'#444'};font-weight:${pi===0?'600':'400'}">${pi===0?k:''}</td>
        <td style="${tdS};color:#fff;text-align:right">${briefName(c.pilot)}</td>
        <td style="${tdS};text-align:right;font-family:'Roboto Mono',monospace;color:#fbbf24">${c.avg.toFixed(3)}</td>
        <td style="${tdS};text-align:right;font-family:'Roboto Mono',monospace;color:#4ade80">${best}</td>
        <td style="${tdS};text-align:right">${c.count}</td>
      </tr>`;
    });
  });
  html+='</tbody></table>';

  document.getElementById('endurance-stats-wrap').innerHTML=html;
}

  if(mode==='basic')wrap.classList.add('endurance-basic');else wrap.classList.remove('endurance-basic');

function _replayFmtTime(ms){
  const totalSec=Math.floor(ms/1000);
  const h=Math.floor(totalSec/3600);
  const m=Math.floor((totalSec%3600)/60);
  const s=totalSec%60;
  return h+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function _replaySeek(val){
  if(_replayInterval){clearInterval(_replayInterval);_replayInterval=null;document.getElementById('replay-play-btn').textContent='▶';}
  const s=_enduranceSessions[_enduranceIdx];
  const start=s.start_time;
  const end=s.end_time;
  _replayT=start+((end-start)*val/1000);
  _replayUpdateDisplay();
}

function _replayUpdateDisplay(){
  const s=_enduranceSessions[_enduranceIdx];
  const elapsed=_replayT-s.start_time;
  const total=s.end_time-s.start_time;
  document.getElementById('replay-time').textContent=_replayFmtTime(elapsed)+' / '+_replayFmtTime(total);
  const rows=_buildReplayState(_replayT);
  _renderReplayTable(rows);
}

function _replayStartInterval(){
  if(_replayInterval)clearInterval(_replayInterval);
  const s=_enduranceSessions[_enduranceIdx];
  const dur=s.end_time-s.start_time;
  const baseStep=dur/2500;
  const speed=_replaySpeeds[_replaySpeedIdx];
  const step=speed===null?1000:baseStep*speed;
  _replayInterval=setInterval(()=>{
    _replayT+=step;
    if(_replayT>=s.end_time){
      _replayT=s.end_time;
      clearInterval(_replayInterval);
      _replayInterval=null;
      document.getElementById('replay-play-btn').textContent='▶';
    }
    const pct=Math.round((_replayT-s.start_time)/dur*1000);
    document.getElementById('replay-slider').value=pct;
    _replayUpdateDisplay();
  },100);
}

function _replayTogglePlay(){
  if(_replayInterval){
    clearInterval(_replayInterval);
    _replayInterval=null;
    document.getElementById('replay-play-btn').textContent='▶';
    return;
  }
  const s=_enduranceSessions[_enduranceIdx];
  const dur=s.end_time-s.start_time;
  const baseStep=dur/2500;
  if(_replayT>=s.end_time-baseStep)_replayT=s.start_time;
  document.getElementById('replay-play-btn').textContent='⏸';
  _replayStartInterval();
}

function _replaySpeedUp(){
  if(_replaySpeedIdx<_replaySpeeds.length-1)_replaySpeedIdx++;
  _replayUpdateSpeedLabel();
  if(_replayInterval)_replayStartInterval();
}

function _replaySpeedDown(){
  if(_replaySpeedIdx>0)_replaySpeedIdx--;
  _replayUpdateSpeedLabel();
  if(_replayInterval)_replayStartInterval();
}

function _replayUpdateSpeedLabel(){
  const sp=_replaySpeeds[_replaySpeedIdx];
  document.getElementById('replay-speed-label').textContent=sp===null?'1s':sp+'x';
}

function _renderEnduranceTeams(){

function _parseS2sec(s2){
  if(!s2)return 0;
  if(s2.includes(':')){const p=s2.split(':');return parseFloat(p[0])*60+parseFloat(p[1]);}
  return parseFloat(s2)||0;
}

function _enduranceLapTime(l){
  const s1=parseFloat(l.s1)||0;
  const s2=_parseS2sec(l.s2);
  return s1+s2;
}

function _fmtDuration(secs){
  const m=Math.floor(secs/60);
  const s=Math.floor(secs%60);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function _buildTeamStints(teamLaps,teamNumber,events){
  // Build pit entry karts + pit durations from isOnPit transitions
  // For each false→true transition: take kart from last event where isOnPit=false
  // For each true→false transition: take lastPitMainTime as pit duration
  const pitEntryKarts=[];// [{ts, kart}] — one per pit entry
  const pitTimesMs=[];// [{ts, durationSec}] — one per pit exit
  let _lastNonPitKart='';
  if(events){
    let wasOnPit=false;
    let pitExitTs=null;// ts of pit exit (true→false transition)
    let latestPitMainTime=null;// latest lastPitMainTime during current stint
    events.forEach(e=>{
      if(!e.data||!e.data.team||e.data.team.number!==teamNumber)return;
      const t=e.data.team;
      const onPit=t.isOnPit===true||t.isOnPit==='true';
      if(!onPit){
        if(t.kart&&t.kart!=='0')_lastNonPitKart=t.kart;
        if(wasOnPit){
          // pit exit: start tracking lastPitMainTime for this stint
          pitExitTs=e.ts;
          latestPitMainTime=null;
        }
        // continuously update lastPitMainTime throughout the stint
        if(pitExitTs!==null&&t.lastPitMainTime&&t.lastPitMainTime!=='0'){
          latestPitMainTime=t.lastPitMainTime;
        }
      }
      if(onPit&&!wasOnPit){
        pitEntryKarts.push({ts:e.ts,kart:_lastNonPitKart});
        // commit pit time from last event of the previous stint
        if(pitExitTs!==null&&latestPitMainTime){
          const durSec=parseTimeSec(latestPitMainTime);
          if(!isNaN(durSec)&&durSec>0)pitTimesMs.push({ts:pitExitTs,durationSec:durSec});
        }
        pitExitTs=null;latestPitMainTime=null;
      }
      wasOnPit=onPit;
    });
    // commit pit time for the last stint (no following pit entry)
    if(pitExitTs!==null&&latestPitMainTime){
      const durSec=parseTimeSec(latestPitMainTime);
      if(!isNaN(durSec)&&durSec>0)pitTimesMs.push({ts:pitExitTs,durationSec:durSec});
    }
  }
  const stints=[];
  let cur=null;
  let prevLapNum=0;
  teamLaps.forEach(l=>{
    const s2sec=_parseS2sec(l.s2);
    const pitSet=_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[teamNumber]||new Set();
    const isPit=pitSet.size>0?pitSet.has(l.lap_number):s2sec>60;
    const lapTime=_enduranceLapTime(l);
    const isKartName=l.pilot.startsWith('Карт ');
    // Detect implicit pit: pilot change with gap in lap numbers (missing laps = pit not recorded in s2)
    const hasLapGap=prevLapNum>0&&l.lap_number-prevLapNum>1;
    const implicitPit=hasLapGap&&cur&&!isKartName&&!cur.pilot.startsWith('Карт ')&&l.pilot!==cur.pilot;
    if(implicitPit&&cur){
      const gapSec=cur.endTs?(l.ts-cur.endTs)/1000:0;
      cur.pitLap=prevLapNum;
      cur.pitS2=gapSec;
      const im=Math.floor(gapSec/60);const is=(gapSec%60).toFixed(3).padStart(6,'0');
      cur.pitExactTime=im>0?(im+':'+is):gapSec.toFixed(3)+'s';
      stints.push(cur);
      cur=null;
    }
    if(!cur||(!isKartName&&l.pilot!==cur.pilot&&!isPit)){
      if(cur)stints.push(cur);
      cur={pilot:l.pilot,kart:'',startLap:l.lap_number,endLap:l.lap_number,
           laps:[],pitLap:null,pitS2:null,pitExactTime:null,startTs:l.ts,endTs:l.ts};
    }
    cur.endLap=l.lap_number;
    cur.endTs=l.ts;
    if(isPit){
      cur.pitLap=l.lap_number;
      cur.pitS2=s2sec;
      cur.pitExactTime=null;
      if(pitTimesMs.length){
        let bestDist=Infinity,bestIdx=-1;
        for(let ei=0;ei<pitTimesMs.length;ei++){
          const dist=Math.abs(pitTimesMs[ei].ts-l.ts);
          if(dist<bestDist){bestDist=dist;bestIdx=ei;}
        }
        if(bestIdx>=0&&bestDist<300000){
          const durSec=pitTimesMs[bestIdx].durationSec;
          const m=Math.floor(durSec/60);
          const s=(durSec%60).toFixed(3).padStart(6,'0');
          cur.pitExactTime=m>0?(m+':'+s):durSec.toFixed(3)+'s';
          pitTimesMs.splice(bestIdx,1);
        }
      }
      cur.laps.push({lap_number:l.lap_number,time:lapTime,s1:l.s1,s2:l.s2,pos:l.position,ts:l.ts,isPit:true});
      stints.push(cur);
      cur=null;
    }else{
      cur.laps.push({lap_number:l.lap_number,time:lapTime,s1:l.s1,s2:l.s2,pos:l.position,ts:l.ts,isPit:false});
    }
    prevLapNum=l.lap_number;
  });
  if(cur)stints.push(cur);
  // Assign karts: each stint's kart = kart from pit entry that ends it (by closest ts)
  // Last stint (no pit) = last known kart on track
  let _pekIdx=0;
  stints.forEach((s,i)=>{
    if(s.pitLap&&_pekIdx<pitEntryKarts.length){
      s.kart=pitEntryKarts[_pekIdx].kart;
      _pekIdx++;
    }else if(i===stints.length-1){
      s.kart=_lastNonPitKart||'';
    }
  });
  const merged=[];
  for(let i=0;i<stints.length;i++){
    const s=stints[i];
    const normalLaps=s.laps.filter(l=>!l.isPit);
    if(normalLaps.length===0&&i<stints.length-1){
      const next=stints[i+1];
      next.startTs=s.startTs;
      next.startLap=s.startLap;
    }else{
      merged.push(s);
    }
  }
  // Merge stints where pilot name changed without pit (delayed timing update)
  // Those laps belong to the next pilot — merge into next stint
  const merged2=[];
  for(let i=0;i<merged.length;i++){
    const s=merged[i];
    const next=merged[i+1];
    if(!s.pitLap&&next&&next.pilot!==s.pilot){
      // No pit between stints = timing name update, merge laps into next stint
      next.laps=[...s.laps,...next.laps];
      next.startLap=s.startLap;
      next.startTs=s.startTs;
    }else{
      merged2.push(s);
    }
  }
  return merged2;
}

function _computePilotAvg(teamLaps,pilotName,teamNumber){
  const pitSet=_enduranceData&&_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[teamNumber]||new Set();
  const cps=_enduranceData&&_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[teamNumber]||new Set();
  const normalTimes=teamLaps
    .filter(l=>l.pilot===pilotName&&(cps.size>0?!cps.has(l.lap_number):_parseS2sec(l.s2)<=60))
    .map(l=>_enduranceLapTime(l))
    .filter(t=>t>0&&t<300);
  if(!normalTimes.length)return{avg:0,threshold:999};
  const rawAvg=normalTimes.reduce((a,b)=>a+b,0)/normalTimes.length;
  const threshold=rawAvg*1.1;
  const clean=normalTimes.filter(t=>t<threshold);
  const avg=clean.length?clean.reduce((a,b)=>a+b,0)/clean.length:rawAvg;
  return{avg,threshold};
}

  const team=teams.find(t=>t.number===teamNumber);
  if(!team)return;
  const allTeamLaps=laps.filter(l=>l.kart===parseInt(teamNumber));
  const teamLaps=(_replayT?allTeamLaps.filter(l=>l.ts<=_replayT):allTeamLaps).sort((a,b)=>a.lap_number-b.lap_number);
  const raceBest=parseTimeSec(meta.bestLapRace);
  _enduranceData._stintTimesCache=null;// clear cache for new team
  const s=_enduranceSessions[_enduranceIdx];

  document.getElementById('et-title').innerHTML=`P${team.position} <span style="color:#e8b830;margin:0 6px">·</span> ${team.teamName} <span style="color:#8a8a8a;font-weight:normal;font-size:14px;margin-left:8px">#${team.number}</span>
    <div style="font-size:13px;color:#8a8a8a;font-weight:normal;margin-top:2px">${window._fmtDateDMY(s.start_time)} · Endurance Race · ${Math.floor(dur/60)}h ${dur%60}min</div>`;

  const allPilots=team.pilots;
  const pilotStats={};
  allPilots.forEach(p=>{
    const{avg,threshold}=_computePilotAvg(teamLaps,p,teamNumber);
    const tps=_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[teamNumber]||new Set();
    const pLaps=teamLaps.filter(l=>l.pilot===p&&(tps.size>0?!tps.has(l.lap_number):_parseS2sec(l.s2)<=60));
    const normalTimes=pLaps.map(l=>_enduranceLapTime(l)).filter(t=>t>0&&t<threshold);
    const best=normalTimes.length?Math.min(...normalTimes):0;
    const pitCount=tps.size>0?teamLaps.filter(l=>l.pilot===p&&tps.has(l.lap_number)).length:teamLaps.filter(l=>l.pilot===p&&_parseS2sec(l.s2)>60).length;
    pilotStats[p]={laps:normalTimes.length,avg,best,pits:pitCount,threshold};
  });

  const teamCleanLaps=[];
  allPilots.forEach(p=>{

    teamLaps.filter(l=>l.pilot===p&&_parseS2sec(l.s2)<=60).forEach(l=>{

    </div>
    <div style="flex:1;padding:10px 16px;text-align:center">
      <div style="font-size:11px;color:#8a8a8a;text-transform:uppercase">AVG</div>
      <div style="font-size:18px;font-weight:700;color:#fff">${teamAvg}</div>
    </div>`;

  let pilotsHtml='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Pilots</div><div style="display:flex;gap:12px;flex-wrap:wrap">';
  allPilots.forEach(p=>{

    pilotsHtml+=`<div style="flex:1;min-width:200px;background:#0a0b10;border:1px solid #1a1a1a;border-radius:6px;padding:12px">

      <div style="display:flex;gap:16px;font-size:13px;flex-wrap:wrap">

        <div><span style="color:#8a8a8a">AVG:</span> <span style="color:#fff">${ps.avg.toFixed(3)}</span></div>
        <div><span style="color:#8a8a8a">Best:</span> <span style="color:#4ade80">${ps.best?ps.best.toFixed(3):'—'}</span></div>
        <div><span style="color:#8a8a8a">Pits:</span> <span style="color:#fff">${ps.pits}</span></div>
      </div>
    </div>`;
  });
  pilotsHtml+='</div>';
  document.getElementById('et-pilots').innerHTML=pilotsHtml;

  _enduranceData._currentTeam={team,teamLaps,pilotStats,raceBest,teamAvg};

  _renderEnduranceStints();
  _renderEndurancePits();

  document.getElementById('modal-endurance-team').classList.add('open');
}

function _parseTotalOnTrack(str){
  if(!str||str==='00:00:00')return 0;
  // "HH:MM:SS" or "MM:SS.mmm"
  const p=str.split(':');
  if(p.length===3)return(parseInt(p[0])||0)*3600+(parseInt(p[1])||0)*60+(parseFloat(p[2])||0);
  if(p.length===2)return(parseInt(p[0])||0)*60+(parseFloat(p[1])||0);
  return parseFloat(str)||0;
}

function _buildStintTimes(teamNumber,events){
  // Returns {stintIndex: seconds} by tracking isOnPit transitions
  // Stint time = totalOnTrack(lastNonPitEvent) + (ts(pitEntryEvent) - ts(lastNonPitEvent))
  const result={};
  if(!events)return result;
  let wasOnPit=false;
  let lastNonPit=null;// {ts, totalOnTrack(sec)}
  let stintIdx=0;
  events.forEach(e=>{
    if(!e.data||!e.data.team||e.data.team.number!==teamNumber)return;
    const t=e.data.team;
    const onPit=t.isOnPit===true||t.isOnPit==='true';
    if(!onPit){
      const tot=_parseTotalOnTrack(t.totalOnTrack);
      lastNonPit={ts:e.ts,totalOnTrack:tot};
    }
    if(onPit&&!wasOnPit&&lastNonPit){
      // false→true: pit entry — compute stint time
      // stintTime = totalOnTrack(lastNonPit) + (ts(pitEntry) - ts(lastNonPit)) - totalOnTrack(pitEntry)
      const tsDelta=Math.max(0,(e.ts-lastNonPit.ts)/1000);
      const pitTot=_parseTotalOnTrack(t.totalOnTrack);
      result[stintIdx]=lastNonPit.totalOnTrack+tsDelta-pitTot;
      stintIdx++;
    }
    wasOnPit=onPit;
  });
  // Last stint: use last non-pit event's totalOnTrack + time since
  if(lastNonPit){
    result['last']=lastNonPit.totalOnTrack;
  }
  return result;
}

function _renderEnduranceStints(){
  const{team,teamLaps,pilotStats,raceBest}=_enduranceData._currentTeam;
  const stints=_buildTeamStints(teamLaps,team.number,_enduranceData.events);
  const briefName=n=>{const p=n.split(' ');return p.length>=2?p[0]+' '+p[1].charAt(0)+'.':n;};

  const hasKarts=stints.some(s=>s.kart);
  let html='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Stints</div>';
  html+=`<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="color:#8a8a8a;text-transform:uppercase;font-size:10px;border-bottom:1px solid #1a1a1a">
      <th style="padding:6px 8px;text-align:left">#</th>
      <th style="padding:6px 8px;text-align:left">PILOT</th>
      ${hasKarts?'<th style="padding:6px 8px;text-align:center">KART</th>':''}
      <th style="padding:6px 8px;text-align:center">LAPS</th>
      <th style="padding:6px 8px;text-align:center">RANGE</th>
      <th style="padding:6px 8px;text-align:right">TIME</th>
      <th style="padding:6px 8px;text-align:right">AVG</th>
      <th style="padding:6px 8px;text-align:right">BEST</th>
      <th style="padding:6px 8px;text-align:right">WORST</th>
      <th style="padding:6px 8px;text-align:right">PIT</th>
    </tr></thead><tbody>`;

  stints.forEach((s,i)=>{
    const pitSet=_enduranceData.pitLapsMap&&_enduranceData.pitLapsMap[_enduranceData._currentTeam.team.number]||new Set();
    const normalLaps=s.laps.filter(l=>!l.isPit);
    const threshold=pilotStats[s.pilot]?pilotStats[s.pilot].threshold:999;
    const cleanTimes=normalLaps.map(l=>l.time).filter(t=>t<threshold);
    const avg=cleanTimes.length?(cleanTimes.reduce((a,b)=>a+b,0)/cleanTimes.length).toFixed(3):'—';
    const best=cleanTimes.length?Math.min(...cleanTimes):0;
    const worstLaps=i>0?normalLaps.slice(1):normalLaps;// skip pit-out lap (first lap of non-first stint)
    const worst=worstLaps.length?Math.max(...worstLaps.map(l=>l.time)):0;

    let stintTime='—';
    // Compute stint time from totalOnTrack in events
    // Find the isOnPit false→true transition that ends this stint
    // stintTimeSec = totalOnTrack(lastNonPitEvent) + (ts(pitEntryEvent) - ts(lastNonPitEvent))
    const teamNum=_enduranceData._currentTeam.team.number;
    if(!_enduranceData._stintTimesCache)_enduranceData._stintTimesCache=_buildStintTimes(teamNum,_enduranceData.events);
    const stintTimes=_enduranceData._stintTimesCache;
    if(stintTimes[i]!==undefined){
      stintTime=_fmtDuration(stintTimes[i]);
    }else if(i===stints.length-1){
      // Last stint (no pit after): use last event's totalOnTrack + ts delta
      const lastStintTime=stintTimes['last'];
      if(lastStintTime!==undefined)stintTime=_fmtDuration(lastStintTime);
    }

    const bestColor=best&&Math.abs(best-raceBest)<0.005?'color:#a78bfa':'color:#4ade80';
    const worstColor=worst>=threshold?'color:#ef4444':'color:#fbbf24';

    let pitStr='<span style="color:#8a8a8a">—</span>';
    if(s.pitLap){
      let pitSec=s.pitS2||0;
      if(s.pitExactTime){
        const pts=s.pitExactTime.replace('s','');
        if(pts.includes(':')){const pp=pts.split(':');pitSec=parseFloat(pp[0])*60+parseFloat(pp[1]);}
        else pitSec=parseFloat(pts)||0;
      }
      const pitCol=pitSec<90?'#ef4444':pitSec<=91?'#4ade80':'#fbbf24';
      const pitDisplay=s.pitExactTime||('~'+(s.pitS2-26).toFixed(3)+'s');
      pitStr=`<span style="color:${pitCol}">${pitDisplay}</span>`;
    }else if(i===stints.length-1){
      pitStr='<span style="color:#8a8a8a">— finish</span>';
    }

    const bg=i%2===0?'#0d0e15':'#0b0c12';
    html+=`<tr style="background:${bg};border-bottom:1px solid #111;cursor:pointer" onclick="_toggleEnduranceStintLaps(${i})">
      <td style="padding:6px 8px;color:#8a8a8a">${i+1}</td>
      <td style="padding:6px 8px;color:#fff">${briefName(s.pilot)}</td>
      ${hasKarts?`<td style="padding:6px 8px;text-align:center;color:#e8b830">${s.kart||'—'}</td>`:''}
      <td style="padding:6px 8px;text-align:center">${normalLaps.length}</td>
      <td style="padding:6px 8px;text-align:center;color:#8a8a8a">${s.startLap}–${s.endLap}</td>
      <td style="padding:6px 8px;text-align:right;color:#fff">${stintTime}</td>
      <td style="padding:6px 8px;text-align:right">${avg}</td>
      <td style="padding:6px 8px;text-align:right;${bestColor}">${best?best.toFixed(3):'—'}</td>
      <td style="padding:6px 8px;text-align:right;${worstColor}">${worst?worst.toFixed(3):'—'}</td>
      <td style="padding:6px 8px;text-align:right">${pitStr}</td>
    </tr>`;
    // Expandable laps row
    const colSpan=hasKarts?10:9;
    html+=`<tr id="et-stint-laps-${i}" style="display:none"><td colspan="${colSpan}" style="padding:0;background:#08090d">`;
    html+=`<table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'Roboto Mono',monospace">
      <thead><tr style="color:#555;font-size:10px;border-bottom:1px solid #1a1a1a">
        <th style="padding:2px 6px;text-align:right;width:36px">LAP</th>
        <th style="padding:2px 6px;text-align:right;width:60px">TIME</th>
        <th style="padding:2px 6px;text-align:right;width:50px">S1</th>
        <th style="padding:2px 6px;text-align:right;width:50px">S2</th>
        <th style="padding:2px 6px;text-align:right;width:30px">POS</th>
      </tr></thead><tbody>`;
    s.laps.forEach((l)=>{
      const lt=l.time;
      const isRealPit=l.isPit;// s2>60
      const isPitAffected=!isRealPit&&pitSet.has(l.lap_number);// pit-in/out
      const isAnomaly=!isRealPit&&!isPitAffected&&lt>=threshold;
      let col='color:#fbbf24';
      if(isRealPit)col='color:#ef4444';
      else if(isAnomaly)col='color:#ef4444';
      else if(isPitAffected)col='color:#8a8a8a';
      else if(best&&Math.abs(lt-raceBest)<0.005)col='color:#a78bfa';
      else if(best&&Math.abs(lt-best)<0.005)col='color:#4ade80';
      const timeStr=isRealPit&&lt>=60?(Math.floor(lt/60)+':'+(lt%60).toFixed(3).padStart(6,'0')):lt?lt.toFixed(3):'—';
      const rowBg=isRealPit?';background:#1a0505':isAnomaly?';background:#1a0f05':'';
      html+=`<tr style="border-bottom:1px solid #0e0f14${rowBg}">
        <td style="padding:2px 6px;color:#555;text-align:right">${l.lap_number}</td>
        <td style="padding:2px 6px;${col};text-align:right">${timeStr}</td>
        <td style="padding:2px 6px;color:#8a8a8a;text-align:right">${l.s1||'—'}</td>
        <td style="padding:2px 6px;color:${isRealPit?'#ef4444':'#8a8a8a'};text-align:right">${l.s2||'—'}</td>
        <td style="padding:2px 6px;color:#555;text-align:right">${l.pos||''}</td>
      </tr>`;
    });
    html+=`</tbody></table></td></tr>`;
  });
  html+='</tbody></table>';
  html+='<div style="font-size:11px;color:#8a8a8a;margin-top:6px">Click stint row to expand laps</div>';
  document.getElementById('et-stints').innerHTML=html;
  _enduranceData._stints=stints;
}

function _renderEnduranceChart(){
  const{teamLaps}=_enduranceData._currentTeam;
  const stints=_enduranceData._stints;
  const teams=_enduranceData.teams;
  const totalTeams=teams.length;
  const posData=teamLaps.filter(l=>_parseS2sec(l.s2)<=60).map(l=>({lap:l.lap_number,pos:l.position}));
  if(!posData.length){document.getElementById('et-chart').innerHTML='';return;}
  const maxLap=Math.max(...posData.map(d=>d.lap));
  const minPos=1;
  const maxPos=totalTeams;
  const W=700,H=160,PAD_L=30,PAD_R=10,PAD_T=10,PAD_B=20;
  const chartW=W-PAD_L-PAD_R;
  const chartH=H-PAD_T-PAD_B;
  const xScale=lap=>(lap/maxLap)*chartW+PAD_L;
  const yScale=pos=>((pos-minPos)/(maxPos-minPos))*chartH+PAD_T;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">`;
  for(let p=1;p<=maxPos;p+=Math.max(1,Math.floor(maxPos/5))){
    const y=yScale(p);
    svg+=`<line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#1a1a1a" stroke-width="0.5"/>`;
    svg+=`<text x="${PAD_L-4}" y="${y+3}" fill="#8a8a8a" font-size="9" text-anchor="end">P${p}</text>`;
  }
  const lapStep=Math.max(1,Math.round(maxLap/7));
  for(let l=0;l<=maxLap;l+=lapStep){
    svg+=`<text x="${xScale(l)}" y="${H-2}" fill="#8a8a8a" font-size="9" text-anchor="middle">${l}</text>`;
  }
  stints.forEach(s=>{
    if(s.pitLap){
      const x=xScale(s.pitLap);
      svg+=`<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${H-PAD_B}" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5"/>`;
    }
  });
  const points=posData.map(d=>`${xScale(d.lap)},${yScale(d.pos)}`).join(' ');
  svg+=`<polyline points="${points}" fill="none" stroke="#e8b830" stroke-width="2"/>`;
  svg+='</svg>';
  let html='<div style="font-size:13px;color:#e8b830;text-transform:uppercase;font-weight:600;margin-bottom:10px">Position Chart</div>';
  html+=`<div style="background:#0a0b10;border:1px solid #1a1a1a;border-radius:6px;padding:12px;position:relative">
    ${svg}
    <div style="position:absolute;right:16px;top:16px;font-size:10px;color:#8a8a8a"><span style="color:#ef4444">┊</span> pit stop</div>
  </div>`;
  document.getElementById('et-chart').innerHTML=html;
}

    let stintTime='';
    if(i>0&&stints[i-1].endTs&&s.endTs){
      stintTime=_fmtDuration((s.endTs-stints[i-1].endTs)/1000);
    }else if(normalLaps.length>=2){
      stintTime=_fmtDuration((s.endTs-s.startTs)/1000);
    }
    const pilotBest=pilotStats[s.pilot]?pilotStats[s.pilot].best:0;

        <span style="color:#8a8a8a" id="et-stint-arrow-${i}">▶</span>
      </div>
      <div id="et-stint-laps-${i}" style="display:none;padding:4px 8px;max-height:300px;overflow-y:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px;font-family:'Roboto Mono',monospace">
          <thead><tr style="color:#8a8a8a;font-size:10px">
            <th style="padding:3px 6px;text-align:left">LAP</th>
            <th style="padding:3px 6px;text-align:right">TIME</th>
            <th style="padding:3px 6px;text-align:right">S1</th>
            <th style="padding:3px 6px;text-align:right">S2</th>
            <th style="padding:3px 6px;text-align:right">POS</th>
          </tr></thead><tbody>`;
    s.laps.forEach(l=>{
      let timeColor='color:#fbbf24';
      let rowBg='';
      if(l.isPit){
        timeColor='color:#ef4444';
        rowBg='background:#1a0505;';

      let timeStr;

        timeStr=m+':'+sec;

      }
      html+=`<tr style="${rowBg}border-bottom:1px solid #111">
        <td style="padding:2px 6px;color:#8a8a8a">${l.lap_number}</td>

        <td style="padding:2px 6px;text-align:right;color:#8a8a8a">${l.pos}</td>
      </tr>`;
    });
    html+='</tbody></table></div></div>';
  });
  document.getElementById('et-laps').innerHTML=html;

/* ─── RACE GENERATOR ─── */
const _PILOT_NAMES=['Апанасенко','Макаревич','Жигаленко','Заугольний','Яковлєв','Салєх','Іващенко','Матвєєв','Буцикін','Міфтахудінов','Кваша','Бурім','Ковшар','Гузар'];
const _KART_NUMS=[1,33,13,8,3,44,2,21,88,20,22,5,16,9];
let _nextSid=1;

function _rnd(min,max){return +(min+Math.random()*(max-min)).toFixed(3);}

let _demoMode=false;
// Extra pilot names for pitstop swaps
const _SWAP_PILOTS=['Богдан','Цаценко','Хітов','Бєгіше','Сарнацький','Топіха'];
let _simLapCount=0;
let _swapsDone=false;
let _demoLaps=new Map(); // pilot → [{lap, s1, s2}]
let _simPitting=new Map(); // name → {newKart, lapsLeft}

function generateRace(){
  // shuffle karts among pilots for each race
  const shuffledKarts=[..._KART_NUMS].sort(()=>Math.random()-.5);
  const _PILOTS=_PILOT_NAMES.map((name,i)=>({name, kart:shuffledKarts[i]}));

  const paceBase=[0,.08,.12,.22,.24,.34,.42,.45,.50,.58,.64,.68,.72,.80];
  const shuffled=[...paceBase].sort(()=>Math.random()-.5);

  // Start with 0 laps — use simLap to advance
  liveData.length=0;
  _PILOTS.forEach((p,i)=>{
    liveData.push({
      pos:i+1, num:p.kart, name:p.name, kart:p.kart, laps:0,
      lastlap:'——', s1:'——', s2:'——',
      best:'——', s1best:'——', s2best:'——',
      gap:'0', missed:'——',
      _pace:shuffled[i],
    });
  });

  // Reset kart history for demo
  _kartHistory.clear();
  _pilotLapTimes.clear();
  _activeRaceNumber=99;
  _simLapCount=0;
  _swapsDone=false;
  _demoLaps.clear();
  _simPitting.clear();
  // Pre-populate pit with 4 unused karts
  const _usedSet=new Set(_KART_NUMS.map(String));
  const _unusedKarts=_ALL_KARTS.filter(k=>!_usedSet.has(String(k))).sort(()=>Math.random()-.5).slice(0,4);
  _pitKarts=new Set(_unusedKarts.map(String));
  // Assign random first pit lap (7-12) for each pilot
  liveData.forEach(d=>{d._nextPitLap=7+Math.floor(Math.random()*6);});

  sLL=Infinity;sLLmin=Infinity;sLLmax=-Infinity;sBest=Infinity;sS1b=Infinity;sS2b=Infinity;sMissed=Infinity;
  const hb=document.getElementById('header-best');
  if(hb)hb.textContent='—';
  _demoMode=true;_isRace=true;
  _enduranceDemoLaps=[];_enduranceDemoLapIdx=0;
  _liveTeamNames={};_stintTime={};_pitCount={};_lastNonPitEvent={};_wasOnPit={};_lastPitTime={};
  document.getElementById('page-live').classList.add('endurance-mode');
  document.getElementById('sim-lap-btn').style.display='';
  document.getElementById('save-race-btn').style.display='';
  const simOb=document.getElementById('ob-sim-btn');
  if(simOb)simOb.style.display='';
  cSort='__reset__'; cDir=1; sortLive('pos');
  _lastRenderHash='';renderLive(liveData);
  // Show active race widget
  const w=document.getElementById('active-race-widget');
  if(w)w.style.display='';
  updateActiveRaceWidget({isOnline:true,meta:{raceNumber:99}});
}

function simLap(){
  if(!liveData.length){generateRace();return;}
  // Endurance demo: feed pre-generated laps instead of random
  if(_enduranceDemoLaps.length&&_enduranceDemoLapIdx<_enduranceDemoLaps.length){
    return _simEnduranceLap();
  }
  _simLapCount++;
  // 1. Process pilots exiting pit
  const _simExiting=[];
  _simPitting.forEach((data,name)=>{data.lapsLeft--;if(data.lapsLeft<=0)_simExiting.push(name);});
  _simExiting.forEach(name=>{
    const d=liveData.find(x=>x.name===name);
    const data=_simPitting.get(name);
    if(d&&data){
      _pitKarts.delete(data.newKart);
      d.kart=parseInt(data.newKart);d.num=parseInt(data.newKart);
      d._nextPitLap=d.laps+7+Math.floor(Math.random()*6);
    }
    _simPitting.delete(name);
  });
  if(_simExiting.length){_lastRenderHash='';renderPitBlock();}
  // 2. Generate laps, check for new pitstops
  liveData.forEach(d=>{
    if(_simPitting.has(d.name))return; // pitting — skip lap
    // Enter pit?
    if(d.laps>=(d._nextPitLap||Infinity)&&_pitKarts.size>0){
      const _taken=new Set([..._simPitting.values()].map(p=>p.newKart));
      const _avail=[..._pitKarts].filter(k=>!_taken.has(k));
      if(_avail.length>0){
        const newKart=_avail[Math.floor(Math.random()*_avail.length)];
        _pitKarts.add(String(d.kart));
        _pitCount[String(d.num)]=(_pitCount[String(d.num)]||0)+1;
        _simPitting.set(d.name,{newKart,lapsLeft:2});
        _lastRenderHash='';renderPitBlock();
        return;
      }
    }
    const pace=d._pace||0;
    // ~10% chance of sensor anomaly
    const isAnomaly=Math.random()<0.1;
    const s1=isAnomaly?+(1+Math.random()*3).toFixed(3):+(28.0+pace*.35+Math.random()*.5).toFixed(3);
    const s2=isAnomaly?+(0.5+Math.random()*2).toFixed(3):+(12.1+pace*.25+Math.random()*.4).toFixed(3);
    const lap=+(s1+s2).toFixed(3);
    d.s1=s1.toFixed(3);d.s2=s2.toFixed(3);d.lastlap=lap.toFixed(3);
    d.laps=(parseInt(d.laps)||0)+1;
    if(!_demoLaps.has(d.name))_demoLaps.set(d.name,[]);
    _demoLaps.get(d.name).push({lap:lap.toFixed(3),s1:s1.toFixed(3),s2:s2.toFixed(3)});
    if(lap>=_minValidLap){if(!_pilotLapTimes.has(d.name))_pilotLapTimes.set(d.name,[]);_pilotLapTimes.get(d.name).push(lap);}
    if(lap>=_minValidLap){
      const prevBest=parseFloat(d.best);
      if(isNaN(prevBest)||!_isValidTime(d.best)||lap<prevBest){d.best=lap.toFixed(3);}
      const prevS1=parseFloat(d.s1best);
      if(isNaN(prevS1)||s1<prevS1){d.s1best=s1.toFixed(3);}
      const prevS2=parseFloat(d.s2best);
      if(isNaN(prevS2)||s2<prevS2){d.s2best=s2.toFixed(3);}
    }
    const s1n=parseFloat(d.s1best),s2n=parseFloat(d.s2best);
    d.missed=(isNaN(s1n)||isNaN(s2n))?'——':(s1n+s2n).toFixed(3);
  });
  // Update kart history from demo data
  liveData.forEach(d=>{
    const k=String(d.kart);
    if(!_kartHistory.has(k))_kartHistory.set(k,[]);
    const arr=_kartHistory.get(k);
    let rec=arr.find(r=>r.pilot===d.name);
    if(!rec){rec={pilot:d.name,best:null,laps:0};arr.push(rec);}
    rec.laps=d.laps;
    const bt=parseTimeSec(d.best);
    if(!isNaN(bt)&&(rec.best===null||bt<rec.best))rec.best=bt;
  });
  liveData.sort((a,b)=>parseFloat(a.best)-parseFloat(b.best));
  const leader=parseFloat(liveData[0].best);
  liveData.forEach((d,i)=>{d.pos=i+1;d.gap=i===0?'0':'+'+(parseFloat(d.best)-leader).toFixed(3);});
  sLL=Math.min(...liveData.map(d=>parseTimeSec(d.best)).filter(n=>!isNaN(n)));
  sLLmin=Math.min(...liveData.map(d=>parseTimeSec(d.lastlap)).filter(n=>!isNaN(n)));
  sLLmax=Math.max(...liveData.map(d=>parseTimeSec(d.lastlap)).filter(n=>!isNaN(n)));
  sBest=sLL;sS1b=Math.min(...liveData.map(d=>parseFloat(d.s1best)).filter(n=>!isNaN(n)));
  sS2b=Math.min(...liveData.map(d=>parseFloat(d.s2best)).filter(n=>!isNaN(n)));
  sMissed=Math.min(...liveData.map(d=>parseFloat(d.missed)).filter(n=>!isNaN(n)));
  const hb=document.getElementById('header-best');if(hb)hb.textContent=isFinite(sBest)?sBest.toFixed(3):'—';
  _lastRenderHash='';renderLive(liveData);
  updateActiveRaceWidget({isOnline:true,meta:{raceNumber:99}});
}
async function saveDemoRace(){
  if(!_demoMode||!liveData.length)return;
  const now=new Date();
  const date=`${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const results=liveData.map(d=>({pos:d.pos,num:d.kart,name:d.name,kart:d.kart,laps:d.laps,best:d.best,gap:d.gap,s1best:d.s1best,s2best:d.s2best,lapTimes:_demoLaps.get(d.name)||[]}));
  const session={sid:Date.now(),title:'Demo Race',date,time,duration:'—',pilots:results.length,winner:results[0]?.name||'—',results};
  sessions.unshift(session);
  if(window._saveSession)await window._saveSession(session);
  renderArchive();
  alert('Demo race saved!');
}

/* ─── DEMO ENDURANCE ─── */
let _enduranceDemoLapIdx=0;
let _enduranceDemoLaps=[];
function generateEnduranceDemo(){
  const TEAMS=[
    {number:1,teamName:'Red Rockets',pilots:['Макаренко','Цаценко','Хітов']},
    {number:3,teamName:'Blue Storm',pilots:['Богдан','Сарнацький','Топіха']},
    {number:5,teamName:'Green Machine',pilots:['Бєгіше','Ковальчук','Петренко']},
    {number:8,teamName:'Yellow Flash',pilots:['Шевченко','Мельник']},
    {number:13,teamName:'Dark Horse',pilots:['Бондаренко','Кравченко','Ткаченко']},
    {number:44,teamName:'Purple Reign',pilots:['Олійник','Коваленко']},
  ];
  const TOTAL_LAPS=80;
  const PIT_EVERY=10;

  // Pre-generate all laps for all teams
  const allLaps=[];
  TEAMS.forEach((team,ti)=>{
    const pace=40.5+ti*0.3+Math.random()*0.5;
    const totalLaps=TOTAL_LAPS-ti*2-Math.floor(Math.random()*3);
    let pilotIdx=0;
    let nextPitLap=PIT_EVERY-2+Math.floor(Math.random()*5);
    for(let lap=1;lap<=totalLaps;lap++){
      const isPit=lap===nextPitLap&&team.pilots.length>1;
      const pilot=team.pilots[pilotIdx%team.pilots.length];
      const s1Base=27.5+ti*0.2;
      const s1=+(s1Base+Math.random()*1.0).toFixed(3);
      let s2;
      if(isPit){
        s2=+(90+Math.random()*5-2).toFixed(3);
        pilotIdx++;
        nextPitLap=lap+PIT_EVERY-2+Math.floor(Math.random()*5);
      }else{
        const s2Base=pace-s1Base;
        s2=+(s2Base+Math.random()*0.8).toFixed(3);
      }
      allLaps.push({kart:team.number,pilot,lap,s1,s2,isPit});
    }
  });
  // Interleave: group by lap number across teams
  allLaps.sort((a,b)=>a.lap-b.lap||(a.kart-b.kart));
  _enduranceDemoLaps=allLaps;
  _enduranceDemoLapIdx=0;

  // Set team names and init stint/pit tracking
  _liveTeamNames={};_stintTime={};_pitCount={};_lastNonPitEvent={};_wasOnPit={};_lastPitTime={};
  TEAMS.forEach(t=>{_liveTeamNames[String(t.number)]=t.teamName;_stintTime[String(t.number)]=0;_pitCount[String(t.number)]=0;});
  document.getElementById('page-live').classList.add('endurance-mode');

  // Init liveData with 0 laps per team (current pilot = first pilot)
  liveData.length=0;
  TEAMS.forEach((t,i)=>{
    liveData.push({
      pos:i+1,num:t.number,name:t.pilots[0],kart:t.number,laps:0,
      lastlap:'——',s1:'——',s2:'——',
      best:'——',s1best:'——',s2best:'——',
      gap:'0',missed:'——',
      _pace:0
    });
  });

  // Reset state
  _kartHistory.clear();
  _pilotLapTimes.clear();
  _demoLaps.clear();
  _simPitting.clear();
  // Pre-populate pit with 4 unused karts
  const _endUsed=new Set(TEAMS.map(t=>String(t.number)));
  const _endUnused=_ALL_KARTS.filter(k=>!_endUsed.has(String(k))).sort(()=>Math.random()-.5).slice(0,4);
  _pitKarts=new Set(_endUnused.map(String));
  _activeRaceNumber=99;
  _simLapCount=0;
  _swapsDone=true;// no auto-swap needed
  sLL=Infinity;sLLmin=Infinity;sLLmax=-Infinity;sBest=Infinity;sS1b=Infinity;sS2b=Infinity;sMissed=Infinity;
  const hb=document.getElementById('header-best');
  if(hb)hb.textContent='—';
  _demoMode=true;_isRace=true;
  document.getElementById('sim-lap-btn').style.display='';
  document.getElementById('save-race-btn').style.display='';
  const simOb=document.getElementById('ob-sim-btn');
  if(simOb)simOb.style.display='';
  cSort='__reset__';cDir=1;sortLive('pos');
  _lastRenderHash='';renderLive(liveData);
  const w=document.getElementById('active-race-widget');
  if(w)w.style.display='';
  updateActiveRaceWidget({isOnline:true,meta:{raceNumber:99}});

  // Switch to live tab
  showPage('live',document.getElementById('tab-live'));
}

function _simEnduranceLap(){
  const curLap=_enduranceDemoLaps[_enduranceDemoLapIdx].lap;
  const roundLaps=[];
  while(_enduranceDemoLapIdx<_enduranceDemoLaps.length&&_enduranceDemoLaps[_enduranceDemoLapIdx].lap===curLap){
    roundLaps.push(_enduranceDemoLaps[_enduranceDemoLapIdx]);
    _enduranceDemoLapIdx++;
  }
  roundLaps.forEach(rl=>{
    const kStr=String(rl.kart);
    let d=liveData.find(x=>x.num===rl.kart); // lookup by team num (kart may have changed)
    if(!d)return;
    // Handle pit exit (2 laps stationary)
    const pitData=_simPitting.get(kStr);
    if(pitData&&pitData.isEndurance){
      pitData.lapsLeft--;
      if(pitData.lapsLeft<=0){
        _pitKarts.delete(pitData.newKart);
        d.kart=parseInt(pitData.newKart);
        d.name=pitData.newPilot;
        d.best='——';d.s1best='——';d.s2best='——';d.missed='——';
        _simPitting.delete(kStr);
        _lastRenderHash='';renderPitBlock();
        // fall through: process this lap with new kart/pilot
      }else{return;} // still in pit
    }
    // Enter pit?
    if(rl.isPit){
      const taken=new Set([..._simPitting.values()].map(p=>p.newKart));
      const avail=[..._pitKarts].filter(k=>!taken.has(k));
      if(avail.length>0){
        const newKart=avail[Math.floor(Math.random()*avail.length)];
        _pitKarts.add(String(d.kart));
        _pitCount[kStr]=(_pitCount[kStr]||0)+1;
        _stintTime[kStr]=0;
        _simPitting.set(kStr,{newKart,lapsLeft:2,newPilot:rl.pilot,isEndurance:true});
        _lastRenderHash='';renderPitBlock();
        return; // skip lap, pilot enters pit
      }
      // No kart available: instant swap, no stationary time
      if(d.name!==rl.pilot){
        _pitCount[kStr]=(_pitCount[kStr]||0)+1;
        _stintTime[kStr]=0;
        d.name=rl.pilot;
        d.best='——';d.s1best='——';d.s2best='——';d.missed='——';
      }
    }
    const lap=+(rl.s1+rl.s2).toFixed(3);
    if(!rl.isPit)_stintTime[kStr]=(_stintTime[kStr]||0)+lap;
    const s2Str=rl.s2>=60?Math.floor(rl.s2/60)+':'+('0'+(rl.s2%60).toFixed(3)).slice(-6):rl.s2.toFixed(3);
    const lapStr=lap>=60?Math.floor(lap/60)+':'+('0'+(lap%60).toFixed(3)).slice(-6):lap.toFixed(3);
    d.s1=rl.s1.toFixed(3);d.s2=s2Str;d.lastlap=lapStr;
    d.laps=rl.lap;
    if(!_demoLaps.has(d.name))_demoLaps.set(d.name,[]);
    _demoLaps.get(d.name).push({lap:lapStr,s1:rl.s1.toFixed(3),s2:s2Str});
    if(lap>=_minValidLap){if(!_pilotLapTimes.has(d.name))_pilotLapTimes.set(d.name,[]);_pilotLapTimes.get(d.name).push(lap);}
    if(!rl.isPit&&lap>=_minValidLap){
      const prevBest=parseTimeSec(d.best);
      if(isNaN(prevBest)||lap<prevBest){d.best=lapStr;}
      const prevS1=parseFloat(d.s1best);
      if(isNaN(prevS1)||rl.s1<prevS1){d.s1best=rl.s1.toFixed(3);}
      const prevS2=parseFloat(d.s2best);
      if(isNaN(prevS2)||rl.s2<prevS2){d.s2best=rl.s2.toFixed(3);}
    }
    const s1n=parseFloat(d.s1best),s2n=parseFloat(d.s2best);
    d.missed=(isNaN(s1n)||isNaN(s2n))?'——':(s1n+s2n).toFixed(3);
    if(!_kartHistory.has(kStr))_kartHistory.set(kStr,[]);
    const arr=_kartHistory.get(kStr);
    let rec=arr.find(r=>r.pilot===d.name);
    if(!rec){rec={pilot:d.name,best:null,laps:0};arr.push(rec);}
    rec.laps=d.laps;
    const bt=parseTimeSec(d.best);
    if(!isNaN(bt)&&(rec.best===null||bt<rec.best))rec.best=bt;
  });
  // Sort by laps desc, then best time
  liveData.sort((a,b)=>{
    const lapDiff=(b.laps||0)-(a.laps||0);
    if(lapDiff!==0)return lapDiff;
    return parseTimeSec(a.best)-parseTimeSec(b.best);
  });
  const leader=liveData[0];
  liveData.forEach((d,i)=>{
    d.pos=i+1;
    if(i===0){d.gap='0';}
    else{
      const lapDiff=(leader.laps||0)-(d.laps||0);
      if(lapDiff>0)d.gap='+'+lapDiff+'L';
      else{const diff=parseTimeSec(d.best)-parseTimeSec(leader.best);d.gap=isNaN(diff)?'——':'+'+diff.toFixed(3);}
    }
  });
  const validBests=liveData.map(d=>parseTimeSec(d.best)).filter(n=>!isNaN(n)&&n>=_minValidLap);
  const validLasts=liveData.map(d=>parseTimeSec(d.lastlap)).filter(n=>!isNaN(n)&&n>=_minValidLap);
  sLL=validBests.length?Math.min(...validBests):Infinity;
  sLLmin=validLasts.length?Math.min(...validLasts):Infinity;
  sLLmax=validLasts.length?Math.max(...validLasts):-Infinity;
  sBest=sLL;
  sS1b=Math.min(...liveData.map(d=>parseFloat(d.s1best)).filter(n=>!isNaN(n)));
  sS2b=Math.min(...liveData.map(d=>parseFloat(d.s2best)).filter(n=>!isNaN(n)));
  sMissed=Math.min(...liveData.map(d=>parseTimeSec(d.missed)).filter(n=>!isNaN(n)));
  const hb=document.getElementById('header-best');if(hb)hb.textContent=isFinite(sBest)?sBest.toFixed(3):'—';
  _lastRenderHash='';renderLive(liveData);
  updateActiveRaceWidget({isOnline:true,meta:{raceNumber:99}});
}

/* ─── VIEW MODE ─── */
let _viewMode='basic';

  _viewMode=mode;
  const tbl=document.querySelector('.live-table');
  if(mode==='basic'){
    tbl.classList.add('view-basic');
    document.getElementById('view-basic-btn').classList.add('active');
    document.getElementById('view-detailed-btn').classList.remove('active');

    tbl.classList.remove('view-basic');
    document.getElementById('view-basic-btn').classList.remove('active');
    document.getElementById('view-detailed-btn').classList.add('active');
  }
}

let _deployEtag=null;
setInterval(async()=>{
  try{
    const r=await fetch(location.href,{method:'HEAD',cache:'no-store'});
    const tag=r.headers.get('etag')||r.headers.get('last-modified');
    if(!tag)return;
    if(_deployEtag&&_deployEtag!==tag){location.reload();return;}
    _deployEtag=tag;
  }catch(e){}
},120000);
